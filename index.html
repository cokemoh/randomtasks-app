<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RandomTasks"/>
<meta name="theme-color" content="#1E1E1E"/>
<title>RandomTasks</title>
<link rel="apple-touch-icon" id="app-icon-link"/>
<link rel="icon" type="image/png" id="favicon-link"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --fig-red:    #F24E1E;
  --fig-salmon: #FF7262;
  --fig-purple: #A259FF;
  --fig-blue:   #1ABCFE;
  --fig-green:  #0ACF83;
  --fig-dark3:  #1E1E1E;
  --primary-dim: rgba(162,89,255,0.15);
  --surface:       #2C2C2C;
  --surface-raised:#333333;
  --surface-hover: #3A3A3A;
  --surface-input: #3D3D3D;
  --border:        rgba(255,255,255,0.1);
  --border-strong: rgba(255,255,255,0.18);
  --text-primary:  #F5F5F5;
  --text-secondary:#A0A0A0;
  --text-disabled: #666666;
  --radius-s: 6px; --radius-m: 10px; --radius-l: 14px;
  --radius-xl: 20px; --radius-full: 999px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--fig-dark3);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
.app {
  min-height: 100svh;
  background: var(--fig-dark3);
  display: flex; justify-content: center; align-items: flex-start;
  padding: 20px 12px 80px;
}
.card {
  width: 100%; max-width: 560px;
  background: var(--surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  overflow: hidden;
}
.top-bar {
  padding: 16px 16px 14px;
  background: var(--surface-raised);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.top-bar-left { display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 30px; height: 30px; flex-shrink: 0; }
.top-bar-title { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.2px; }
.top-bar-sub { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.pick-btn {
  flex-shrink: 0; background: var(--primary-dim);
  color: var(--fig-purple); border: 1px solid rgba(162,89,255,0.3);
  border-radius: var(--radius-full); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500; padding: 7px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s; white-space: nowrap;
}
.pick-btn:active { background: rgba(162,89,255,0.28); }
.pick-btn:disabled { opacity: 0.4; }

/* Speed Round button */
.speed-btn {
  flex-shrink: 0; background: rgba(242,78,30,0.15);
  color: var(--fig-red); border: 1px solid rgba(242,78,30,0.35);
  border-radius: var(--radius-full); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500; padding: 7px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s; white-space: nowrap;
}
.speed-btn:active { background: rgba(242,78,30,0.28); }
.speed-btn.active { background: var(--fig-red); color: #fff; border-color: var(--fig-red); }

/* Speed Round panel */
.speed-panel {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.35s cubic-bezier(0.2,0,0,1);
  border-bottom: 0px solid transparent;
}
.speed-panel.open {
  max-height: 420px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.speed-panel-inner {
  background: linear-gradient(135deg, #F24E1E 0%, #FF7262 50%, #A259FF 100%);
  padding: 24px 20px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  position: relative; overflow: hidden;
}
/* subtle animated shimmer */
.speed-panel-inner::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.07) 50%, transparent 100%);
  animation: shimmer 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.speed-label {
  font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: rgba(255,255,255,0.9);
}

/* The big timer display */
.speed-timer {
  font-size: 72px; font-weight: 600; color: #fff;
  letter-spacing: -2px; line-height: 1;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  transition: opacity 0.2s;
  position: relative; z-index: 1;
}
.speed-timer.faded { opacity: 0.4; }

/* Countdown overlay (3, 2, 1, Go!) */
.speed-countdown {
  font-size: 96px; font-weight: 700; color: #fff;
  line-height: 1; text-shadow: 0 4px 24px rgba(0,0,0,0.4);
  animation: countPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; z-index: 1;
}
@keyframes countPop {
  0%   { transform: scale(0.4); opacity: 0; }
  60%  { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1);   opacity: 1; }
}
.speed-countdown.go { color: #0ACF83; font-size: 80px; }

/* Timer controls */
.speed-controls { display: flex; gap: 12px; position: relative; z-index: 1; }
.speed-go-btn {
  background: #fff; color: var(--fig-red);
  border: none; border-radius: var(--radius-full);
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
  padding: 10px 28px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
  letter-spacing: 0.2px;
}
.speed-go-btn:active { transform: scale(0.95); filter: brightness(0.95); }
.speed-pause-btn {
  background: rgba(255,255,255,0.2); color: #fff;
  border: 1.5px solid rgba(255,255,255,0.4); border-radius: var(--radius-full);
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
  padding: 10px 22px; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex; align-items: center; gap: 7px;
}
.speed-pause-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
.speed-reset-btn {
  background: rgba(255,255,255,0.15); color: #fff;
  border: 1.5px solid rgba(255,255,255,0.4); border-radius: var(--radius-full);
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
  padding: 10px 22px; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex; align-items: center; gap: 7px;
}
.speed-reset-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }

/* Mute toggle button */
.speed-mute-btn {
  position: absolute; top: 8px; right: 8px;
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85);
  border: 1.5px solid rgba(255,255,255,0.25); border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  z-index: 2;
}
.speed-mute-btn:active { background: rgba(255,255,255,0.28); }
.speed-mute-btn.muted { background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.15); }

/* Speed round results */
.speed-results {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  position: relative; z-index: 1; text-align: center; padding: 4px 0;
  animation: countPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  overflow: hidden;
}
.speed-results-headline {
  font-size: 22px; font-weight: 700; color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  line-height: 1.2;
}
.speed-results-sub {
  font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 400;
}
.speed-results-stats {
  display: flex; gap: 16px; margin-top: 4px;
}
.speed-stat {
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: var(--radius-l);
  padding: 12px 20px;
  width: 100px;        /* fixed equal width */
  flex-shrink: 0;
  text-align: center;
}
.speed-stat-num {
  font-size: 36px; font-weight: 700; color: #fff; line-height: 1;
  text-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.speed-stat-label {
  font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; color: rgba(255,255,255,0.85);
  margin-top: 4px;
}

/* Confetti canvas sits over the speed panel inner */
#confetti-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  border-radius: inherit;
}

/* Duration picker */
.duration-picker {
  display: flex; gap: 8px; align-items: center;
  position: relative; z-index: 1; flex-wrap: wrap; justify-content: center;
}
.dur-btn {
  background: rgba(255,255,255,0.15); color: #fff;
  border: 1.5px solid rgba(255,255,255,0.3); border-radius: var(--radius-full);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  padding: 6px 14px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  white-space: nowrap;
}
.dur-btn:active { transform: scale(0.95); }
.dur-btn.selected {
  background: rgba(255,255,255,0.35);
  border-color: rgba(255,255,255,0.8);
}
.dur-btn:disabled { opacity: 0.35; cursor: default; }

/* Custom duration input row */
.custom-dur-row {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.12);
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: var(--radius-full);
  padding: 4px 6px 4px 14px;
  transition: border-color 0.15s;
}
.custom-dur-row:focus-within { border-color: rgba(255,255,255,0.8); }
.custom-dur-input {
  background: transparent; border: none; outline: none;
  font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600;
  color: #fff; width: 36px; text-align: center;
  -moz-appearance: textfield;
}
.custom-dur-input::-webkit-inner-spin-button,
.custom-dur-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.custom-dur-input::placeholder { color: rgba(255,255,255,0.5); font-weight: 400; }
.custom-dur-label { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; }
.custom-dur-set {
  background: rgba(255,255,255,0.25); color: #fff; border: none;
  border-radius: var(--radius-full); font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 700; padding: 4px 10px; cursor: pointer;
  transition: background 0.13s; white-space: nowrap;
}
.custom-dur-set:active { background: rgba(255,255,255,0.4); }
.banner-wrap { padding: 12px 14px; background: var(--surface-raised); border-bottom: 1px solid var(--border); }
.pick-banner {
  background: linear-gradient(135deg, rgba(162,89,255,0.18), rgba(26,188,254,0.12));
  border: 1px solid rgba(162,89,255,0.35); border-radius: var(--radius-l);
  padding: 11px 12px; display: flex; align-items: center; gap: 12px;
  animation: bannerIn 0.2s ease;
}
@keyframes bannerIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
.banner-icon {
  width: 34px; height: 34px; border-radius: var(--radius-s);
  background: linear-gradient(135deg, var(--fig-purple), var(--fig-blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.banner-body { flex: 1; min-width: 0; }
.banner-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 2px; }
.banner-text { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pick-dismiss {
  background: none; border: none; cursor: pointer;
  width: 44px; height: 44px; border-radius: var(--radius-s);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); font-size: 18px; flex-shrink: 0;
}
.add-area { padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface-raised); }

/* ── Centered action bar ── */
.action-bar {
  padding: 10px 14px;
  background: var(--surface-raised);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.add-field {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-input); border: 1px solid var(--border-strong);
  border-radius: var(--radius-full); padding: 0 6px 0 16px; height: 44px;
  transition: border-color 0.15s;
}
.add-field:focus-within { border-color: var(--fig-purple); box-shadow: 0 0 0 2px rgba(162,89,255,0.2); }
.add-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Inter', sans-serif; font-size: 16px; color: var(--text-primary); outline: none;
}
.add-input::placeholder { color: var(--text-disabled); }
.add-btn {
  width: 32px; height: 32px; background: var(--fig-purple); color: #fff;
  border: none; border-radius: var(--radius-full); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(162,89,255,0.45); line-height: 1; padding-bottom: 1px;
}
.add-btn:active { transform: scale(0.93); }
.section-label { padding: 10px 14px 5px; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-secondary); }

/* Section label row with inline action */
.section-label-row {
  padding: 10px 14px 5px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-label-text {
  font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--text-secondary);
}
.uncheck-all-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
  color: var(--text-secondary); padding: 2px 0;
  transition: color 0.13s;
  letter-spacing: 0.1px;
}
.uncheck-all-btn:active { color: var(--fig-purple); }

/* ── Repeat day picker ── */
.repeat-row {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px 6px 44px;
  border-top: 1px solid var(--border);
  background: rgba(162,89,255,0.04);
  flex-wrap: wrap;
}
.repeat-day-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.13s, border-color 0.13s, color 0.13s;
  flex-shrink: 0;
}
.repeat-day-btn.active {
  background: var(--fig-purple);
  border-color: var(--fig-purple);
  color: #fff;
  box-shadow: 0 0 0 2px rgba(162,89,255,0.25);
}
.repeat-day-btn:active { transform: scale(0.92); }
.repeat-indicator {
  font-size: 10px; color: var(--fig-purple); margin-left: 2px;
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
}
.icon-btn.repeat-btn.has-repeat { color: var(--fig-purple); }
.list { padding: 6px 10px 12px; display: flex; flex-direction: column; gap: 3px; min-height: 60px; }
.task-block {
  border-radius: var(--radius-l); overflow: hidden;
  background: var(--surface-raised); border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.task-block.picked-card { border-color: rgba(162,89,255,0.5); box-shadow: 0 0 0 1px rgba(162,89,255,0.2); }
/* Backlog picked card uses Figma blue instead of purple */
.backlog-list .task-block.picked-card { border-color: rgba(26,188,254,0.6); box-shadow: 0 0 0 1px rgba(26,188,254,0.25), inset 0 0 20px rgba(26,188,254,0.05); }

/* ── Swipe to delete ── */
.swipe-wrap {
  position: relative;
}
.swipe-delete-bg {
  position: absolute; right: 0; top: 0; height: 52px;
  width: 80px;
  background: var(--fig-red);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 600;
  gap: 4px; flex-direction: column;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
  border-radius: 0 var(--radius-l) var(--radius-l) 0;
}
.swipe-delete-bg svg { flex-shrink: 0; }
.swipe-content {
  position: relative; z-index: 1;
  background: var(--surface-raised);
  transition: transform 0.2s ease;
  will-change: transform;
}
/* Delete btn: always visible on desktop, hidden on mobile (swipe reveals it) */
.delete-row-btn {
  width: 44px; height: 44px; border: none; background: none; cursor: pointer;
  border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); flex-shrink: 0; transition: background 0.13s, color 0.13s;
}
.delete-row-btn:hover { color: var(--fig-red); }
.delete-row-btn:active { background: rgba(242,78,30,0.15); color: var(--fig-red); }
@media (hover: none) and (pointer: coarse) {
  .delete-row-btn { display: none; }
  .delete-row-btn.always-visible { display: flex; }
}
.item {
  display: flex; align-items: center;
  padding: 10px 8px 10px 12px; min-height: 52px; cursor: pointer; gap: 10px;
  transition: background 0.13s; border-radius: var(--radius-l) var(--radius-l) 0 0;
  -webkit-user-select: none; user-select: none;
}
.item.no-subs { border-radius: var(--radius-l); }
.item:active { background: var(--surface-hover); }
.checkbox {
  width: 18px; height: 18px; border: 1.5px solid var(--text-disabled);
  border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.18s, background 0.18s; position: relative;
}
.item:not(.done) .checkbox { display: none; }
.item.done .checkbox { border-color: var(--fig-green); background: var(--fig-green); }
.checkmark { position: absolute; width: 10px; height: 10px; opacity: 0; transition: opacity 0.15s; }
.item.done .checkmark { opacity: 1; }
.item-num {
  min-width: 22px; height: 20px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.07); color: var(--text-secondary);
  font-size: 11px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; padding: 0 6px; transition: all 0.2s;
}
.item.done .item-num { display: none; }
.item-num-picked { background: rgba(162,89,255,0.2) !important; font-size: 13px !important; }

/* ── Drag handle ── */
.drag-handle {
  width: 14px; height: 34px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-disabled); cursor: grab; opacity: 0;
  transition: opacity 0.13s;
  touch-action: none;
}
.drag-handle:active { cursor: grabbing; }
.item:hover .drag-handle { opacity: 1; }
.item.done .drag-handle { display: none; }

/* ── Drag states ── */
.task-block.dragging {
  opacity: 0.4;
  box-shadow: none !important;
}
.task-block.drag-over-above {
  border-top: 2px solid var(--fig-purple);
  margin-top: -2px;
}
.task-block.drag-over-below {
  border-bottom: 2px solid var(--fig-purple);
}

/* ── Backlog section ── */
.backlog-section {
  border-top: 1px solid var(--border);
  margin-top: 4px;
}
.backlog-header {
  padding: 10px 14px 6px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.backlog-header-left { display: flex; align-items: center; gap: 8px; }
.backlog-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--text-secondary);
}
.backlog-count {
  font-size: 10px; font-weight: 500;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.06);
  border-radius: var(--radius-full);
  padding: 1px 7px;
}
.backlog-actions { display: flex; align-items: center; gap: 6px; }
.backlog-pick-btn {
  background: rgba(26,188,254,0.12); color: var(--fig-blue);
  border: 1px solid rgba(26,188,254,0.3); border-radius: var(--radius-full);
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
  padding: 5px 10px; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.15s; white-space: nowrap;
}
.backlog-pick-btn:active { background: rgba(26,188,254,0.22); }
.backlog-pick-btn:disabled { opacity: 0.35; cursor: default; }
.backlog-add-btn {
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.08); color: var(--text-secondary);
  border: 1px solid var(--border-strong); border-radius: var(--radius-full);
  font-size: 18px; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.13s, color 0.13s;
}
.backlog-add-btn:active { background: rgba(255,255,255,0.15); color: var(--text-primary); }
.backlog-add-row {
  padding: 6px 10px 8px;
  display: flex; align-items: center; gap: 8px;
}
.backlog-add-field {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-input); border: 1px solid var(--border-strong);
  border-radius: var(--radius-full); padding: 0 6px 0 16px; height: 44px;
  flex: 1; transition: border-color 0.15s;
}
.backlog-add-field:focus-within { border-color: var(--fig-blue); box-shadow: 0 0 0 2px rgba(26,188,254,0.15); }
.backlog-add-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Inter', sans-serif; font-size: 16px; color: var(--text-primary); outline: none;
}
.backlog-add-input::placeholder { color: var(--text-disabled); }
.backlog-submit-btn {
  width: 32px; height: 32px; background: var(--fig-blue); color: #000;
  border: none; border-radius: var(--radius-full); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  line-height: 1; padding-bottom: 1px; font-weight: 700;
  box-shadow: 0 2px 8px rgba(26,188,254,0.35);
}
.backlog-submit-btn:active { transform: scale(0.93); }
.backlog-list { padding: 0 10px 10px; display: flex; flex-direction: column; gap: 3px; }
.backlog-empty {
  padding: 16px 14px; font-size: 12px; color: var(--text-secondary);
  text-align: center; font-style: italic;
}
/* drop zone highlight when dragging over backlog */
.backlog-list.drop-active {
  background: rgba(26,188,254,0.05);
  border-radius: var(--radius-l);
  outline: 2px dashed rgba(26,188,254,0.3);
  outline-offset: 2px;
}
.active-list.drop-active {
  background: rgba(162,89,255,0.05);
  border-radius: var(--radius-l);
  outline: 2px dashed rgba(162,89,255,0.3);
  outline-offset: 2px;
}
/* Backlog pick banner */
.backlog-banner-wrap { padding: 0 10px 8px; }
.backlog-pick-banner {
  background: linear-gradient(135deg, rgba(26,188,254,0.15), rgba(10,207,131,0.1));
  border: 1px solid rgba(26,188,254,0.3); border-radius: var(--radius-l);
  padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  animation: bannerIn 0.2s ease;
}
.backlog-banner-icon {
  width: 30px; height: 30px; border-radius: var(--radius-s);
  background: linear-gradient(135deg, var(--fig-blue), var(--fig-green));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.backlog-banner-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--fig-blue); margin-bottom: 1px; }
.backlog-banner-text { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.backlog-banner-dismiss { background: none; border: none; cursor: pointer; width: 44px; height: 44px; border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 14px; flex-shrink: 0; }
/* Backlog task blocks get a subtle blue tint */
.backlog-list .task-block { border-color: rgba(26,188,254,0.12); }
.backlog-list .task-block:hover { border-color: rgba(26,188,254,0.28); }
.item-body { flex: 1; min-width: 0; }
.item-text {
  font-size: 14px; color: var(--text-primary); position: relative;
  white-space: normal; overflow: visible; text-overflow: unset;
  display: block; transition: color 0.22s, text-decoration-color 0.3s ease;
  word-break: break-word; text-decoration: line-through; text-decoration-color: transparent;
}
.item.done .item-text { color: var(--text-disabled); text-decoration-color: var(--text-disabled); }
.item-sub-hint { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.progress-row { height: 2px; background: rgba(255,255,255,0.07); margin: 0 12px 8px; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--fig-purple), var(--fig-blue)); transition: width 0.35s ease; border-radius: 2px; }
.picked-star { font-size: 13px; flex-shrink: 0; }
.expand-btn {
  flex-shrink: 0; width: 44px; height: 44px; border: none; background: none; cursor: pointer;
  border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); transition: transform 0.2s;
}
.expand-btn.open { transform: rotate(180deg); }
.expand-btn.add-sub-chevron { color: var(--text-secondary); opacity: 1; }
.expand-btn.add-sub-chevron:hover { color: var(--fig-green); }
.expand-btn.add-sub-chevron:active { background: rgba(10,207,131,0.12); color: var(--fig-green); }
.icon-btn {
  width: 44px; height: 44px; border: none; background: none; cursor: pointer;
  border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); flex-shrink: 0; transition: background 0.13s, color 0.13s;
}
.icon-btn:active { background: rgba(255,255,255,0.08); }
.icon-btn.delete-btn:active { background: rgba(242,78,30,0.15); color: var(--fig-red); }
.icon-btn.add-sub-btn:active { background: rgba(10,207,131,0.12); color: var(--fig-green); }
.icon-btn.task-action-btn { color: var(--text-secondary); }
.icon-btn.task-action-btn:hover { color: var(--text-secondary); }
.icon-btn.task-action-btn.repeat-active { color: var(--fig-purple); }
.subtasks { overflow: hidden; transition: max-height 0.28s ease; background: rgba(0,0,0,0.15); border-top: 1px solid var(--border); }
.subtasks-inner { padding: 4px 8px 6px 12px; display: flex; flex-direction: column; gap: 1px; }
.subitem {
  display: flex; align-items: flex-start; padding: 8px 6px 8px 32px;
  min-height: 44px; border-radius: var(--radius-s); cursor: pointer; gap: 10px;
  position: relative; transition: background 0.13s;
  -webkit-user-select: none; user-select: none;
}
.subitem::before { content: ''; position: absolute; left: 14px; top: 50%; width: 12px; height: 1px; background: rgba(255,255,255,0.12); }
.subitem:active { background: rgba(255,255,255,0.05); }
.sub-checkbox {
  width: 14px; height: 14px; border: 1.5px solid var(--text-secondary); border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.18s, background 0.18s; position: relative;
}
.subitem.done .sub-checkbox { background: var(--fig-green); border-color: var(--fig-green); }

/* Subtask drag handle */
.sub-drag-handle {
  width: 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-disabled); cursor: grab; opacity: 0;
  transition: opacity 0.13s; touch-action: none;
  margin-left: -4px; align-self: center;
}
.sub-drag-handle:active { cursor: grabbing; }
.subitem:hover .sub-drag-handle { opacity: 1; }
.subitem.sub-dragging { opacity: 0.35; }
.subitem.sub-drag-over-above { border-top: 2px solid var(--fig-purple); margin-top: -2px; }
.subitem.sub-drag-over-below { border-bottom: 2px solid var(--fig-purple); }
.sub-checkmark { position: absolute; width: 8px; height: 8px; opacity: 0; transition: opacity 0.15s; }
.subitem.done .sub-checkmark { opacity: 1; }
.subitem-text { flex: 1; font-size: 13px; color: var(--text-secondary); position: relative; white-space: normal; overflow: visible; text-overflow: unset; transition: color 0.22s, text-decoration-color 0.3s ease; word-break: break-word; text-decoration: line-through; text-decoration-color: transparent; }
.subitem.done .subitem-text { color: var(--text-disabled); text-decoration-color: var(--text-disabled); }
.sub-icon-btn {
  width: 44px; height: 44px; border: none; background: none; cursor: pointer;
  border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); flex-shrink: 0;
}
.sub-icon-btn:active { background: rgba(242,78,30,0.15); color: var(--fig-red); }
.sub-add-row {
  display: flex; align-items: center; gap: 6px;
  margin: 3px 0 3px 32px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-strong); border-radius: var(--radius-s); padding: 4px 8px;
}
.sub-add-input { flex: 1; border: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 16px; color: var(--text-primary); outline: none; padding: 3px 0; }
.sub-add-input::placeholder { color: var(--text-disabled); }
.sub-add-confirm { width: 32px; height: 32px; border: none; background: var(--fig-green); color: #000; border-radius: var(--radius-s); cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sub-add-cancel { width: 32px; height: 32px; border: none; background: rgba(255,255,255,0.07); color: var(--text-secondary); border-radius: var(--radius-s); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* Add subtask trigger at bottom of expanded subtask list */
.sub-add-trigger {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px 6px 32px;
  font-size: 12px; color: var(--text-secondary);
  cursor: pointer; border-radius: var(--radius-s);
  transition: color 0.13s, background 0.13s;
  -webkit-user-select: none; user-select: none;
}
.sub-add-trigger:hover { color: var(--fig-green); }
.sub-add-trigger:active { background: rgba(10,207,131,0.08); color: var(--fig-green); }
.empty { padding: 48px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.empty-icon { font-size: 36px; }
.empty-text { font-size: 15px; color: var(--text-secondary); font-weight: 500; }
.empty-sub { font-size: 12px; color: var(--text-secondary); }
.footer { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); background: var(--surface-raised); }
.footer-count { font-size: 12px; color: var(--text-secondary); }
.footer-count strong { color: var(--fig-green); font-weight: 600; }
.clear-btn { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--fig-red); background: rgba(242,78,30,0.1); border: 1px solid rgba(242,78,30,0.25); border-radius: var(--radius-full); cursor: pointer; padding: 5px 12px; }
.clear-btn:active { background: rgba(242,78,30,0.22); }
/* ── Inline edit ── */
.edit-field {
  flex: 1; min-width: 0;
  background: var(--surface-input);
  border: 1.5px solid var(--fig-purple);
  border-radius: var(--radius-s);
  padding: 4px 8px;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 0 0 2px rgba(162,89,255,0.2);
}
.edit-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Inter', sans-serif; font-size: 16px;
  color: var(--text-primary); outline: none;
}
.sub-edit-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Inter', sans-serif; font-size: 16px;
  color: var(--text-primary); outline: none;
}
.edit-confirm {
  width: 44px; height: 44px; border: none; background: var(--fig-purple);
  color: #fff; border-radius: var(--radius-s); cursor: pointer;
  font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.edit-cancel {
  width: 44px; height: 44px; border: none; background: rgba(255,255,255,0.07);
  color: var(--text-secondary); border-radius: var(--radius-s); cursor: pointer;
  font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.icon-btn.edit-btn:active { background: rgba(162,89,255,0.15); color: var(--fig-purple); }

/* ── ··· overflow menu ── */
.overflow-menu-wrap { position: relative; flex-shrink: 0; }
.overflow-btn {
  width: 44px; height: 44px; border: none; background: none; cursor: pointer;
  border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); transition: background 0.13s, color 0.13s;
  font-size: 16px; letter-spacing: 1px; font-weight: 700; padding-bottom: 4px;
}
.overflow-btn:active { background: rgba(255,255,255,0.08); }
.overflow-popover {
  position: absolute; right: 0; top: 38px; z-index: 200;
  background: var(--surface-raised);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-m);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  min-width: 148px;
  overflow: hidden;
  animation: popIn 0.12s ease;
}
.overflow-popover.above { top: auto; bottom: 38px; }
@keyframes popIn {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}
.overflow-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text-primary);
  transition: background 0.1s;
  border: none; background: none; width: 100%;
  font-family: 'Inter', sans-serif; text-align: left;
}
.overflow-item:active { background: rgba(255,255,255,0.07); }
.overflow-item svg { flex-shrink: 0; color: var(--text-secondary); }
.overflow-item.repeat-active { color: var(--fig-purple); }
.overflow-item.repeat-active svg { color: var(--fig-purple); }
.overflow-item + .overflow-item { border-top: 1px solid var(--border); }

/* ── Side drawer ── */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.55);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed; left: 0; top: 0; bottom: 0; z-index: 101;
  width: 280px; max-width: 80vw;
  background: var(--surface-raised);
  border-right: 1px solid var(--border-strong);
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(0.2,0,0,1);
  padding-top: env(safe-area-inset-top);
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-title {
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.8px;
}
.drawer-close {
  width: 44px; height: 44px; background: none; border: none;
  color: var(--text-secondary); cursor: pointer; border-radius: var(--radius-s);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background 0.13s;
}
.drawer-close:active { background: rgba(255,255,255,0.08); }

.drawer-lists { flex: 1; overflow-y: auto; padding: 8px 8px; }

.drawer-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; border-radius: var(--radius-m);
  cursor: pointer; transition: background 0.13s;
  position: relative;
}
.drawer-list-item:active { background: var(--surface-hover); }
.drawer-list-item.active { background: var(--primary-dim); }

.drawer-list-icon {
  width: 32px; height: 32px; border-radius: var(--radius-s);
  background: var(--fig-purple); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 18px;
}
button.drawer-list-icon {
  border: none; cursor: pointer; padding: 0; transition: transform 0.15s;
}
button.drawer-list-icon:active { transform: scale(0.88); }
.drawer-list-item.active .drawer-list-icon { box-shadow: 0 0 0 2px rgba(162,89,255,0.4); }

.drawer-list-info { flex: 1; min-width: 0; }
.drawer-list-name {
  font-size: 14px; font-weight: 500; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.drawer-list-count { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

.drawer-list-delete {
  width: 44px; height: 44px; background: none; border: none; cursor: pointer;
  border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); font-size: 14px;
  transition: background 0.13s, color 0.13s; flex-shrink: 0;
}
.drawer-list-delete:active { background: rgba(242,78,30,0.15); color: var(--fig-red); }

/* Drawer drag handle */
.drawer-drag-handle {
  width: 20px; height: 32px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-disabled); cursor: grab; touch-action: none;
  transition: color 0.13s;
}
.drawer-drag-handle:active { cursor: grabbing; }
.drawer-list-item.list-dragging { opacity: 0.35; }
.drawer-list-item.list-drag-over-above { border-top: 2px solid var(--fig-purple); }
.drawer-list-item.list-drag-over-below { border-bottom: 2px solid var(--fig-purple); }

.drawer-new-btn {
  margin: 8px 8px 12px;
  background: rgba(255,255,255,0.06);
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius-m);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  padding: 12px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  width: calc(100% - 16px);
}
.drawer-new-btn:active { background: rgba(162,89,255,0.1); border-color: var(--fig-purple); color: var(--fig-purple); }

/* ── Auth section (drawer footer) ── */
.drawer-auth {
  padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.auth-signin-btn {
  width: 100%;
  padding: 10px 14px;
  background: transparent;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-m);
  color: var(--text-secondary);
  font-size: 13px;
  font-family: 'Inter', -apple-system, sans-serif;
  cursor: pointer;
  text-align: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.auth-signin-btn:active { background: rgba(162,89,255,0.1); border-color: var(--fig-purple); color: var(--fig-purple); }
.auth-user-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 4px 2px;
}
.auth-email {
  flex: 1;
  font-size: 12px;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.auth-signout-btn {
  flex-shrink: 0;
  font-size: 12px;
  color: var(--text-secondary);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-s);
  font-family: 'Inter', -apple-system, sans-serif;
  transition: color 0.15s, background 0.15s;
}
.auth-signout-btn:active { color: var(--fig-red); background: rgba(242,78,30,0.1); }
.auth-delete-btn {
  display: block;
  width: 100%;
  font-size: 11px;
  color: var(--text-secondary);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 12px 6px;
  border-radius: var(--radius-s);
  font-family: 'Inter', -apple-system, sans-serif;
  text-align: left;
  transition: color 0.15s;
}
.auth-delete-btn:hover { color: var(--fig-red); }
.auth-delete-btn:active { color: var(--fig-red); background: rgba(242,78,30,0.1); }
.auth-sync-dot {
  font-size: 11px;
  color: var(--fig-green);
  padding: 0 4px 6px;
}

/* ── Editable title ── */
.title-wrap {
  display: flex; align-items: center; gap: 4px; cursor: text;
}
.top-bar-title-input {
  font-size: 16px; font-weight: 600; color: var(--text-primary);
  letter-spacing: -0.2px; background: transparent; border: none; outline: none;
  font-family: 'Inter', -apple-system, sans-serif;
  padding: 0; margin: 0; width: 100%;
  -webkit-appearance: none;
}
.top-bar-title-input:focus {
  border-bottom: 1.5px solid var(--fig-purple);
}

/* Logo button (clickable) */
.logo-btn {
  background: none; border: none; cursor: pointer; padding: 0;
  display: flex; align-items: center; flex-shrink: 0;
  border-radius: var(--radius-s);
  transition: opacity 0.15s;
}
.logo-btn:active { opacity: 0.7; }

/* ── Header action button (share / leave) ── */
.header-action-btn {
  background: none; border: none; cursor: pointer; padding: 0;
  width: 44px; height: 44px;
  border-radius: var(--radius-s); color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.13s, color 0.13s; flex-shrink: 0;
}
.header-action-btn:active { background: var(--surface-hover); color: var(--text-primary); }

/* ── Modal overlay ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

/* ── Share modal (bottom sheet) ── */
.share-modal {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: var(--surface-raised); border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border); z-index: 201;
  padding: 0 0 env(safe-area-inset-bottom, 16px);
  transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
  max-height: 80vh; display: flex; flex-direction: column;
}
.share-modal.open { transform: translateX(-50%) translateY(0); }
.share-modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border-strong); margin: 12px auto 0; flex-shrink: 0;
}
.share-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; flex-shrink: 0;
}
.share-modal-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.modal-close-btn {

<script>
(function() {
  const svgSrc = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="181.5 14.5 308 308" width="512" height="512">
    <rect width="512" height="512" rx="112" fill="#1E1E1E"/>
    <g transform="rotate(-6, 340, 210)">
      <rect x="258" y="84" width="180" height="222" rx="22" fill="#4c1d95" opacity="0.3"/>
      <rect x="250" y="76" width="180" height="222" rx="20" fill="#7c3aed"/>
      <rect x="285" y="64" width="110" height="26" rx="5" fill="#a78bfa"/>
      <rect x="315" y="39" width="50" height="28" rx="4" fill="none" stroke="#a78bfa" stroke-width="12"/>
      <circle cx="278" cy="148" r="5" fill="white"/>
      <line x1="292" y1="148" x2="390" y2="148" stroke="white" stroke-width="5" stroke-linecap="round"/>

      <line x1="292" y1="229" x2="368" y2="229" stroke="white" stroke-width="5" stroke-linecap="round"/>
    </g>
  </svg>`;
  const blob = new Blob([svgSrc], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 512, 512);
    URL.revokeObjectURL(url);
    const png = canvas.toDataURL('image/png');
    document.getElementById('app-icon-link').href = png;
    document.getElementById('favicon-link').href = png;
  };
  img.src = url;
})();

          <span class="backlog-count" id="backlog-count">0</span>
        </div>
        <div class="backlog-actions">
          <button class="backlog-pick-btn" id="backlog-pick-btn" onclick="pickBacklog()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M3 17 C7 17 9 7 21 7" stroke="#1ABCFE" stroke-width="2" stroke-linecap="round"/>
              <polyline points="17 3 21 7 17 11" stroke="#1ABCFE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 7 C7 7 9 17 21 17" stroke="#1ABCFE" stroke-width="2" stroke-linecap="round"/>
              <polyline points="17 13 21 17 17 21" stroke="#1ABCFE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Pick from backlog
          </button>
          <button class="backlog-add-btn" onclick="toggleBacklogAdd()" title="Add to backlog">+</button>
        </div>
      </div>
      <div id="backlog-banner-wrap" style="display:none" class="backlog-banner-wrap">
        <div class="backlog-pick-banner">
          <div class="backlog-banner-icon">⭐</div>
          <div style="flex:1;min-width:0;cursor:pointer" onclick="scrollToBacklogPicked()">
            <div class="backlog-banner-label">Focus on this ↓</div>
            <div class="backlog-banner-text" id="backlog-banner-text"></div>
          </div>
          <button class="backlog-banner-dismiss" onclick="dismissBacklogPick()">×</button>
        </div>
      </div>
      <div id="backlog-add-row" class="backlog-add-row" style="display:none">
        <div class="backlog-add-field">
          <input class="backlog-add-input" id="backlog-input" placeholder="Add to backlog…" onkeydown="if(event.key==='Enter')addBacklogItem();if(event.key==='Escape')toggleBacklogAdd()"/>
          <button class="backlog-submit-btn" onclick="addBacklogItem()">+</button>
        </div>
      </div>
      <div class="backlog-list" id="backlog-list"></div>
    </div>

    <div id="completed-container"></div>

    <div id="footer" style="display:none" class="footer">
      <span class="footer-count"><strong id="done-count">0</strong> completed</span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const mkId = () => crypto.randomUUID();
let items = [];
let pickedId = null;
let pickedBacklogId = null;
let editingId = null;
let editingSubId = null;
let backlogItems = [];
let backlogAddOpen = false;

// ── Data layer (parallel to existing state — Step 1 of Supabase refactor) ──
// dataItems / dataBacklog hold only persisted fields (no UI state).
// uiState holds ephemeral UI flags, keyed by item id, never saved.
let dataItems   = [];
let dataBacklog = [];
const uiState   = new Map();

// ── Speed Round state ──────────────────────────────────────────────────────
let speedOpen = false;
let speedRunning = false;
let speedSeconds = 600;
let speedInterval = null;
let speedCountingDown = false;
let selectedDuration = 10;
let alarmInterval = null;
let audioCtx = null;
let isMuted = false;
// Tally
let speedTallyTasks = 0;
let speedTallySubtasks = 0;
let speedTallyActive = false;
// Deadline-based timing (immune to backgrounding drift)
let speedEndTime = null;        // Date.now() ms when timer should reach 0
let speedPauseRemaining = null; // ms remaining when paused
let speedAlarmTimeout = null;   // setTimeout handle for end-of-round alarm

function setDuration(minutes) {
  if (speedRunning || speedCountingDown) return;
  selectedDuration = minutes;
  speedSeconds = minutes * 60;
  // Update selected pill
  [5, 10, 15].forEach(m => {
    const b = document.getElementById(`dur-${m}`);
    if (b) b.classList.toggle('selected', m === minutes);
  });
  // Clear custom input value and any inline style so it returns to its default appearance
  const customInput = document.getElementById('custom-dur-input');
  if (customInput) { customInput.value = ''; customInput.style.color = ''; customInput.setCustomValidity(''); }
  // Update timer display
  const t = document.getElementById('speed-timer');
  if (t) { t.textContent = formatTime(speedSeconds); t.style.color = '#fff'; }
}

function setCustomDuration() {
  if (speedRunning || speedCountingDown) return;
  const input = document.getElementById('custom-dur-input');
  const val = parseInt(input.value, 10);
  if (!val || val < 1 || val > 99) {
    input.setCustomValidity('Enter a number between 1 and 99');
    input.reportValidity();
    input.focus(); input.select();
    return;
  }
  input.setCustomValidity('');
  selectedDuration = val;
  speedSeconds = val * 60;
  // Deselect preset pills
  [5, 10, 15].forEach(m => {
    const b = document.getElementById(`dur-${m}`);
    if (b) b.classList.remove('selected');
  });
  const t = document.getElementById('speed-timer');
  if (t) { t.textContent = formatTime(speedSeconds); t.style.color = '#fff'; }
  input.blur();
}

function toggleSpeedPanel() {
  unlockAudio();
  speedOpen = !speedOpen;
  const panel = document.getElementById('speed-panel');
  const btn = document.getElementById('speed-btn');
  panel.classList.toggle('open', speedOpen);
  btn.classList.toggle('active', speedOpen);
  // Stop alarm if panel is closed while ringing
  if (!speedOpen && alarmInterval) {
    clearInterval(alarmInterval);
    alarmInterval = null;
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function updateTimerDisplay() {
  const secs = (speedEndTime && speedRunning) ? Math.max(0, Math.ceil((speedEndTime - Date.now()) / 1000)) : speedSeconds;
  const el = document.getElementById('speed-timer');
  if (el) el.textContent = formatTime(secs);
}

// ── Audio ─────────────────────────────────────────────────────────────────
function unlockAudio() {
  try {
    if (!audioCtx) {
      // 'playback' category tells iOS to ignore the silent switch (like alarm/media apps)
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'playback' });
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    // Play a silent buffer — forces iOS to fully unlock audio
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {}
}

function toggleMute() {
  isMuted = !isMuted;
  const btn  = document.getElementById('mute-btn');
  const icon = document.getElementById('mute-icon');
  if (!btn || !icon) return;
  btn.classList.toggle('muted', isMuted);
  btn.title = isMuted ? 'Alarm is muted' : 'Toggle alarm sound';
  if (isMuted) {
    // Muted: speaker-off icon
    icon.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
    // Stop any currently playing alarm
    if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
  } else {
    // Unmuted: speaker icon
    icon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>`;
  }
}

function playAlarm() {
  if (isMuted) return;
  try {
    // Always create a fresh context — iOS kills stale ones silently
    if (!audioCtx || audioCtx.state === 'closed') {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'playback' });
    }
    // iOS suspends the context after inactivity — always resume first
    const playNotes = () => {
      const ctx = audioCtx;
      const notes = [523.25, 659.25, 783.99];
      const noteLength = 0.55;
      const gap = 0.18;

      notes.forEach((freq, i) => {
        const startTime = ctx.currentTime + i * (noteLength + gap);
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.45, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteLength);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(startTime); osc.stop(startTime + noteLength);

        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(freq * 2, startTime);
        gain2.gain.setValueAtTime(0, startTime);
        gain2.gain.linearRampToValueAtTime(0.1, startTime + 0.02);
        gain2.gain.exponentialRampToValueAtTime(0.001, startTime + noteLength * 0.7);
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.start(startTime); osc2.stop(startTime + noteLength);
      });

      const chordStart = ctx.currentTime + notes.length * (noteLength + gap);
      notes.forEach(freq => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, chordStart);
        gain.gain.setValueAtTime(0, chordStart);
        gain.gain.linearRampToValueAtTime(0.2, chordStart + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, chordStart + 1.8);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(chordStart); osc.stop(chordStart + 1.8);
      });
    };

    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(playNotes).catch(() => {});
    } else {
      playNotes();
    }
  } catch(e) {}
}

function startSpeedRound() {
  if (speedCountingDown) return;
  unlockAudio(); // Must be first — synchronous inside the tap gesture so iOS unlocks audio
  speedCountingDown = true;

  const display = document.getElementById('speed-display');
  const goBtn = document.getElementById('speed-go-btn');
  const pauseBtn = document.getElementById('speed-pause-btn');
  const resetBtn = document.getElementById('speed-reset-btn');
  goBtn.style.display = 'none';
  const picker = document.getElementById('duration-picker');
  if (picker) picker.style.display = 'none';

  const steps = ['3', '2', '1', 'Go!'];
  let i = 0;

  function showStep() {
    if (i >= steps.length) {
      // Done counting — show the timer and start it
      speedCountingDown = false;
      speedRunning = true;
      speedTallyTasks = 0;
      speedTallySubtasks = 0;
      speedTallyActive = true;
      // Set absolute deadline from current remaining seconds
      speedEndTime = Date.now() + speedSeconds * 1000;
      display.innerHTML = `<div class="speed-timer" id="speed-timer">${formatTime(speedSeconds)}</div>`;
      pauseBtn.style.display = '';
      resetBtn.style.display = '';
      speedInterval = setInterval(() => {
        const remainingMs = speedEndTime - Date.now();
        const remaining = Math.max(0, Math.ceil(remainingMs / 1000));
        speedSeconds = remaining;
        if (remainingMs <= 500) {
          fireAlarm();
          return;
        }
        updateTimerDisplay();
      }, 250); // Poll 4× per second so we catch the exact moment promptly
      return;
    }
    const step = steps[i];
    const isGo = step === 'Go!';
    display.innerHTML = `<div class="speed-countdown${isGo ? ' go' : ''}">${step}</div>`;
    i++;
    setTimeout(showStep, isGo ? 700 : 600);
  }

  showStep();
}

function fireAlarm() {
  const banner = document.getElementById('audio-unlock-banner');
  if (banner) banner.remove();
  clearInterval(speedInterval);
  speedRunning = false;
  speedTallyActive = false;
  speedEndTime = null;
  const t = document.getElementById('speed-timer');
  if (t) { t.textContent = '0:00'; t.style.color = '#0ACF83'; }
  const pauseBtn = document.getElementById('speed-pause-btn');
  const resetBtn = document.getElementById('speed-reset-btn');
  if (pauseBtn) pauseBtn.style.display = 'none';

  // Try to play — if context is suspended (backgrounded), show tap overlay
  const tryPlay = () => {
    if (!audioCtx || audioCtx.state === 'closed') {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'playback' });
    }
    if (audioCtx.state === 'suspended') {
      // Can't play without user gesture — show tap overlay
      showAlarmOverlay();
      return;
    }
    playAlarm();
    alarmInterval = setInterval(playAlarm, 4000);
  };
  tryPlay();

  if (resetBtn) {
    resetBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg><span>Dismiss</span>`;
    resetBtn.style.display = '';
    resetBtn.style.background = 'rgba(255,255,255,0.3)';
    resetBtn.style.borderColor = 'rgba(255,255,255,0.7)';
    resetBtn.onclick = resetSpeedRound;
  }
}

function showAudioUnlockBanner() {
  if (isMuted) return;
  const existing = document.getElementById('audio-unlock-banner');
  if (existing) return;
  const banner = document.createElement('div');
  banner.id = 'audio-unlock-banner';
  banner.style.cssText = `
    position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
    background:rgba(162,89,255,0.95);color:#fff;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
    padding:14px 28px;border-radius:24px;z-index:9998;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);cursor:pointer;
    white-space:nowrap;-webkit-tap-highlight-color:transparent;
  `;
  banner.textContent = '🔔 Tap to enable alarm sound';
  banner.addEventListener('click', () => {
    // Create fresh context and play a real audible beep to unlock
    try {
      if (!audioCtx || audioCtx.state === 'closed') {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'playback' });
      }
      audioCtx.resume().then(() => {
        // Play a completely silent tone — just enough to unlock iOS audio
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 440;
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      });
    } catch(e) {}
    banner.remove();
  });
  document.body.appendChild(banner);
  // No auto-dismiss — persists until tapped
}

function showAlarmOverlay() {
  // Remove any existing overlay
  const existing = document.getElementById('alarm-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'alarm-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;
    background:rgba(162,89,255,0.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;cursor:pointer;
  `;
  overlay.innerHTML = `
    <div style="font-size:48px">⏰</div>
    <div style="font-size:22px;font-weight:700;color:#fff">Time's up!</div>
    <div style="font-size:15px;color:rgba(255,255,255,0.8)">Tap anywhere to hear alarm</div>
  `;
  overlay.addEventListener('click', () => {
    unlockAudio();
    overlay.remove();
    playAlarm();
    alarmInterval = setInterval(playAlarm, 4000);
  });
  document.body.appendChild(overlay);
}

function pauseSpeedRound() {
  const pauseBtn = document.getElementById('speed-pause-btn');
  const pauseLabel = document.getElementById('pause-label');
  const pauseIcon = pauseBtn.querySelector('svg');
  if (speedRunning) {
    // Pausing — snapshot remaining ms, clear deadline
    clearInterval(speedInterval);
    speedRunning = false;
    speedPauseRemaining = speedEndTime ? Math.max(0, speedEndTime - Date.now()) : speedSeconds * 1000;
    speedEndTime = null;
    speedSeconds = Math.ceil(speedPauseRemaining / 1000);
    pauseIcon.innerHTML = '<polygon points="0,0 12,7 0,14" />';
    pauseIcon.setAttribute('viewBox', '0 0 12 14');
    if (pauseLabel) pauseLabel.textContent = 'Resume';
  } else {
    // Resuming — restore deadline from remaining ms
    const remaining = speedPauseRemaining !== null ? speedPauseRemaining : speedSeconds * 1000;
    speedEndTime = Date.now() + remaining;
    speedPauseRemaining = null;
    speedRunning = true;
    if (pauseLabel) pauseLabel.textContent = 'Pause';
    pauseIcon.innerHTML = '<rect x="0" y="0" width="4" height="14" rx="1.5"/><rect x="8" y="0" width="4" height="14" rx="1.5"/>';
    pauseIcon.setAttribute('viewBox', '0 0 12 14');

    // Schedule exact alarm at deadline — won't drift
    // Clear any previously scheduled alarm before setting a new one
    if (speedAlarmTimeout !== null) clearTimeout(speedAlarmTimeout);
    speedAlarmTimeout = setTimeout(() => {
      speedAlarmTimeout = null;
      if (!speedRunning) return;
      clearInterval(speedInterval);
      fireAlarm();
    }, remaining);

    speedInterval = setInterval(() => {
      const remainingMs = speedEndTime - Date.now();
      if (remainingMs <= 0) return;
      speedSeconds = Math.max(1, Math.ceil(remainingMs / 1000));
      updateTimerDisplay();
    }, 250);
  }
}

function resetSpeedRound() {
  const overlay = document.getElementById('alarm-overlay');
  if (overlay) overlay.remove();
  const banner = document.getElementById('audio-unlock-banner');
  if (banner) banner.remove();
  const wasAlarmRinging = !!alarmInterval;
  clearInterval(speedInterval);
  clearInterval(alarmInterval);
  if (speedAlarmTimeout !== null) { clearTimeout(speedAlarmTimeout); speedAlarmTimeout = null; }
  alarmInterval = null;
  speedRunning = false;
  speedTallyActive = false;
  speedCountingDown = false;
  speedEndTime = null;
  speedPauseRemaining = null;

  const display  = document.getElementById('speed-display');
  const goBtn    = document.getElementById('speed-go-btn');
  const pauseBtn = document.getElementById('speed-pause-btn');
  const resetBtn = document.getElementById('speed-reset-btn');
  const picker   = document.getElementById('duration-picker');

  if (wasAlarmRinging) {
    // Build stats section only if something was completed
    const hasTally = speedTallyTasks > 0 || speedTallySubtasks > 0;
    const taskLabel = speedTallyTasks    === 1 ? 'task'    : 'tasks';
    const subLabel  = speedTallySubtasks === 1 ? 'subtask' : 'subtasks';
    const statsHtml = hasTally ? `
      <div class="speed-results-sub">Completed this round:</div>
      <div class="speed-results-stats">
        <div class="speed-stat">
          <div class="speed-stat-num">${speedTallyTasks}</div>
          <div class="speed-stat-label">${taskLabel}</div>
        </div>
        ${speedTallySubtasks > 0 ? `<div class="speed-stat">
          <div class="speed-stat-num">${speedTallySubtasks}</div>
          <div class="speed-stat-label">${subLabel}</div>
        </div>` : ''}
      </div>` : '';

    display.innerHTML = `
      <canvas id="confetti-canvas"></canvas>
      <div class="speed-results">
        <div class="speed-results-headline">🎉 You crushed it!</div>
        ${statsHtml}
      </div>`;

    if (hasTally) launchConfetti();

    goBtn.style.display = '';
    goBtn.textContent = '↺ New round';
    pauseBtn.style.display = 'none';
    resetBtn.style.display = '';
    resetBtn.innerHTML = 'Dismiss';
    resetBtn.style.background = 'rgba(255,255,255,0.15)';
    resetBtn.style.borderColor = 'rgba(255,255,255,0.3)';
    if (picker) picker.style.display = 'none';
    // Dismiss — go back to duration picker
    resetBtn.onclick = () => {
      stopConfetti();
      speedSeconds = selectedDuration * 60;
      display.innerHTML = `<div class="speed-timer" id="speed-timer">${formatTime(speedSeconds)}</div>`;
      goBtn.textContent = '▶ Go';
      goBtn.onclick = startSpeedRound;
      pauseBtn.style.display = 'none';
      resetBtn.style.display = 'none';
      resetBtn.style.background = '';
      resetBtn.style.borderColor = '';
      resetBtn.onclick = resetSpeedRound;
      if (picker) picker.style.display = '';
    };
    // New round — start immediately
    goBtn.onclick = () => {
      stopConfetti();
      goBtn.textContent = '▶ Go';
      goBtn.onclick = startSpeedRound;
      speedSeconds = selectedDuration * 60;
      display.innerHTML = `<div class="speed-timer" id="speed-timer">${formatTime(speedSeconds)}</div>`;
      resetBtn.style.display = 'none';
      resetBtn.style.background = '';
      resetBtn.style.borderColor = '';
      resetBtn.onclick = resetSpeedRound;
      if (picker) picker.style.display = '';
      startSpeedRound();
    };
  } else {
    // Normal reset
    speedSeconds = selectedDuration * 60;
    display.innerHTML = `<div class="speed-timer" id="speed-timer">${formatTime(speedSeconds)}</div>`;
    goBtn.textContent = '▶ Go';
    goBtn.onclick = startSpeedRound;
    goBtn.style.display = '';
    pauseBtn.innerHTML = '<svg width="12" height="14" viewBox="0 0 12 14" fill="currentColor" style="flex-shrink:0"><rect x="0" y="0" width="4" height="14" rx="1.5"/><rect x="8" y="0" width="4" height="14" rx="1.5"/></svg><span id="pause-label">Pause</span>';
    pauseBtn.style.display = 'none';
    resetBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.36 2.64L3 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="3 3 3 8 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Reset</span>';
    resetBtn.style.display = 'none';
    resetBtn.style.background = '';
    resetBtn.style.borderColor = '';
    if (picker) picker.style.display = '';
  }
}

const STORAGE_KEY     = 'figma-tasks-v1';
const COUNTER_KEY        = 'figma-tasks-counter-v1'; // legacy — no longer written
const UUID_MIGRATION_KEY = 'rt-uuid-v1';
const LIST_ORDER_KEY     = 'rt-list-order-v1';
const BACKLOG_KEY     = 'figma-tasks-backlog-v1';
const LISTS_KEY       = 'figma-tasks-lists-v1';
const ACTIVE_LIST_KEY = 'figma-tasks-active-list-v1';
const MIGRATED_KEY    = 'rt-migrated-v1';
const OWNER_KEY       = 'rt-owner-v1';

// ── Supabase config ────────────────────────────────────────────────────────
// Fill in your project URL and anon key from the Supabase dashboard.
// Leave the placeholders as-is to run in pure localStorage mode (no cloud).
//
// SQL schema to run once in the Supabase SQL editor:
//
//   create table lists (
//     id         bigint primary key,
//     owner_id   uuid references auth.users not null,
//     name       text not null default 'Tasks',
//     created_at timestamptz default now()
//   );
//   alter table lists enable row level security;
//   create policy "owner" on lists for all using (auth.uid() = owner_id);
//
//   create table items (
//     id           bigint primary key,
//     list_id      bigint references lists on delete cascade not null,
//     text         text not null default '',
//     done         boolean not null default false,
//     section      text not null default 'active',
//     position     float not null default 0,
//     repeat_days  jsonb not null default '[]',
//     completed_at timestamptz,
//     created_at   timestamptz default now()
//   );
//   alter table items enable row level security;
//   create policy "owner" on items for all using (
//     exists (select 1 from lists where lists.id = items.list_id and lists.owner_id = auth.uid())
//   );
//
//   create table subtasks (
//     id        bigint primary key,
//     item_id   bigint references items on delete cascade not null,
//     text      text not null default '',
//     done      boolean not null default false,

// Direct fetch wrapper for Supabase PostgREST — bypasses SDK for DB calls
// so the new sb_publishable_ key format doesn't break the query pipeline.
async function sbRest(path, { method = 'GET', body, prefer } = {}) {
  if (!supabaseToken) throw new Error('Not authenticated');
  const headers = {
    'apikey':        SUPABASE_ANON,
    'Authorization': `Bearer ${supabaseToken}`,
    'Content-Type':  'application/json',
  };
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers,
    body: body != null ? JSON.stringify(body) : undefined,
  });
  const text = await res.text();
  if (!text) return null;
  const json = JSON.parse(text);
  if (!res.ok) throw new Error(json.message || json.error || `HTTP ${res.status}`);
  return json;
}

function updateAuthUI() {
  const el = document.getElementById('drawer-auth');
  if (!el) return;
  if (!sb) { el.innerHTML = ''; return; }
  if (supabaseUser) {
    el.innerHTML =
      `<div class="auth-user-row">

         <button class="auth-signout-btn" onclick="signOut()">Sign out</button>
       </div>
       <button class="auth-delete-btn" onclick="openDeleteModal()">Delete account &amp; data…</button>`;
  } else if (authPending) {

  } else {
    el.innerHTML =

  }

function subscribeRealtime() {
  if (!sb || !supabaseUser || realtimeChannel) return;
  realtimeChannel = sb.channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'items' },        onRemoteChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'subtasks' },     onRemoteChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'list_members' }, onRemoteChange)
    .subscribe();
}

function onRemoteChange() {
  clearTimeout(realtimeReloadTimer);
  realtimeReloadTimer = setTimeout(async () => {
    if (!supabaseUser || sbSaveTimer || editingId || editingSubId) return;
    await loadFromSupabase();
  }, 600);
}

function unsubscribeRealtime() {
  if (realtimeChannel) {
    sb.removeChannel(realtimeChannel);
    realtimeChannel = null;
  }
}

async function signIn() {

function handleNewSignIn(user) {
  const storedOwner = localStorage.getItem(OWNER_KEY);
  if (storedOwner && storedOwner !== user.id) {
    clearLocalData();
    localStorage.removeItem(MIGRATED_KEY); // different user — let their data migrate fresh
  }
  localStorage.setItem(OWNER_KEY, user.id);
}

function clearLocalData() {
  lists = [{ id: mkId(), name: 'Tasks', items: [], backlogItems: [], icon: 'app' }];
  activeListId = lists[0].id;
  localStorage.removeItem(LISTS_KEY);
  localStorage.removeItem(ACTIVE_LIST_KEY);
  localStorage.removeItem(COUNTER_KEY);
  localStorage.removeItem(OWNER_KEY);
  // MIGRATED_KEY intentionally not cleared here — only cleared on user switch

  uiState.clear();
  syncFromList();
  render();

    const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-account`, {

async function initAuth() {
  if (!sb) return;

  // Show "Signing in…" if page loaded from an OAuth redirect
  authPending = window.location.hash.includes('access_token');
  updateAuthUI();

  // Wire listener before getSession so it catches the OAuth hash exchange
  sb.auth.onAuthStateChange(async (_event, session) => {
    const wasLoggedIn = !!supabaseUser;
    supabaseUser  = session?.user         ?? null;
    supabaseToken = session?.access_token ?? null;
    authPending = false;
    updateAuthUI();
    if (supabaseUser && !wasLoggedIn) {
      handleNewSignIn(supabaseUser);
      const pendingJoin = localStorage.getItem('rt-pending-join');
      if (pendingJoin) {
        localStorage.removeItem('rt-pending-join');
        pendingJoinToken = pendingJoin;
      }
      await migrateToSupabase(supabaseUser);
      await loadFromSupabase();
      if (pendingJoinToken) await acceptJoin();
    }
  });

  // Resolves existing session (or processes the OAuth hash on redirect)
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user && !supabaseUser) {
    supabaseUser  = session.user;
    supabaseToken = session.access_token;
    authPending = false;
    updateAuthUI();
    handleNewSignIn(supabaseUser);
    await migrateToSupabase(supabaseUser);
    await loadFromSupabase();
    const pendingJoin = localStorage.getItem('rt-pending-join');
    if (pendingJoin) {
      localStorage.removeItem('rt-pending-join');
      pendingJoinToken = pendingJoin;
    }
    if (pendingJoinToken) await acceptJoin();
  }
}

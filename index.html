// ── Repeat reset scheduler ─────────────────────────────────────────────────
const repeatTimers = {};

function msUntilNextOccurrence(targetDay) {
  const now = new Date();
  const resetTime = new Date(now);
  let daysAhead = (targetDay - now.getDay() + 7) % 7;
  resetTime.setDate(now.getDate() + daysAhead);
  resetTime.setHours(0, 1, 0, 0);
  if (resetTime <= now) {
    resetTime.setDate(resetTime.getDate() + 7);
  }
  return resetTime.getTime() - now.getTime();
}

function checkOverdueResets() {
  const now = new Date();
  const todayDay = now.getDay();
  const todayReset = new Date(now);
  todayReset.setHours(0, 1, 0, 0);

  let changed = false;
  lists.forEach(list => {
    (list.items || []).forEach(it => {
      if (!it.done || !it.repeat || !it.repeat.length) return;
      if (!it.repeat.includes(todayDay)) return;
      // Only reset if completed before today's 12:01am — not if completed today
      const completedAt = it.completedAt || 0;
      if (completedAt < todayReset.getTime()) {
        it.done = false;
        (it.subtasks || []).forEach(s => s.done = false);
        it.completedAt = null;
        changed = true;
      }
    });
  });
  if (changed) {
    save();
    syncFromList();
    render();
  }
}

function scheduleRepeatResets() {
  Object.values(repeatTimers).forEach(tid => clearTimeout(tid));
  Object.keys(repeatTimers).forEach(k => delete repeatTimers[k]);

  // Sync working arrays into lists first
  syncToList();

  lists.forEach(list => {
    (list.items || []).forEach(it => {
      if (!it.done || !it.repeat || !it.repeat.length) return;
      const delays = it.repeat.map(d => msUntilNextOccurrence(d));
      const soonest = Math.min(...delays);
      const key = `${list.id}-${it.id}`;
      repeatTimers[key] = setTimeout(() => {
        const targetList = lists.find(l => l.id === list.id);
        if (!targetList) return;
        const targetItem = (targetList.items || []).find(i => i.id === it.id);
        if (!targetItem || !targetItem.done) return;
        targetItem.done = false;
        (targetItem.subtasks || []).forEach(s => s.done = false);
        targetItem.completedAt = null;
        save();
        if (list.id === activeListId) { syncFromList(); render(); }
        scheduleRepeatResets();
      }, soonest);
    });
  });
}

function deleteItem(id) {

function pickRandom() {

// ── Subtask drag-to-reorder ────────────────────────────────────────────────
let subDragParentId = null;
let subDragSubId    = null;
let subTouchClone   = null;
let subTouchOffY    = 0;

function getSubArray(parentId) {
  const active = items.find(i => i.id === parentId);
  if (active) return { arr: active.subtasks, section: 'active' };
  const backlog = backlogItems.find(i => i.id === parentId);
  if (backlog) return { arr: backlog.subtasks || [], section: 'backlog' };
  return null;
}

function reorderSubs(parentId, srcSubId, targetSubId, insertBefore) {
  const found = getSubArray(parentId);
  if (!found) return;
  const arr = found.arr;
  const srcIdx = arr.findIndex(s => s.id === srcSubId);
  if (srcIdx === -1) return;
  const [moved] = arr.splice(srcIdx, 1);
  const tIdx = arr.findIndex(s => s.id === targetSubId);
  if (tIdx === -1) { arr.push(moved); }
  else arr.splice(insertBefore ? tIdx : tIdx + 1, 0, moved);
  save();
  if (found.section === 'backlog') renderBacklog(); else render();
}

function clearSubDragStates() {
  document.querySelectorAll('.subitem').forEach(el =>
    el.classList.remove('sub-dragging', 'sub-drag-over-above', 'sub-drag-over-below')
  );
}

// ── Mouse drag for subtasks ────────────────────────────────────────────────
function subDragMouseStart(e, parentId, subId) {
  if (e.button !== 0) return;
  e.stopPropagation();
  e.preventDefault();
  subDragParentId = parentId;
  subDragSubId    = subId;
  const el = e.target.closest('.subitem');
  if (el) el.classList.add('sub-dragging');

  function onMouseMove(ev) {
    clearSubDragStates();
    const el2 = document.elementFromPoint(ev.clientX, ev.clientY);
    if (!el2) return;
    const target = el2.closest('.subitem[data-parent-id]');
    if (!target || safeId(target.dataset.parentId) !== parentId) return;
    if (safeId(target.dataset.subId) === subId) return;
    const rect = target.getBoundingClientRect();
    target.classList.add(ev.clientY < rect.top + rect.height / 2 ? 'sub-drag-over-above' : 'sub-drag-over-below');
  }

  function onMouseUp(ev) {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    const el2 = document.elementFromPoint(ev.clientX, ev.clientY);
    clearSubDragStates();
    if (!el2) return;
    const target = el2.closest('.subitem[data-parent-id]');
    if (!target || safeId(target.dataset.parentId) !== parentId) return;
    const targetSubId = safeId(target.dataset.subId);
    if (targetSubId === null || targetSubId === subId) return;
    const rect = target.getBoundingClientRect();
    reorderSubs(parentId, subId, targetSubId, ev.clientY < rect.top + rect.height / 2);
    subDragParentId = null; subDragSubId = null;
  }

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
}

// ── Touch drag for subtasks ────────────────────────────────────────────────
function subDragTouchStart(e, parentId, subId) {
  if (e.touches.length !== 1) return;
  e.stopPropagation();
  subDragParentId = parentId;
  subDragSubId    = subId;
  const el = e.target.closest('.subitem');
  if (!el) return;
  const rect = el.getBoundingClientRect();
  subTouchOffY = e.touches[0].clientY - rect.top;
  subTouchClone = el.cloneNode(true);
  subTouchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:9999;pointer-events:none;opacity:0.85;box-shadow:0 4px 16px rgba(0,0,0,0.4);border-radius:8px;transition:none;background:var(--surface-raised);`;
  document.body.appendChild(subTouchClone);
  el.classList.add('sub-dragging');
  document.addEventListener('touchmove', onSubTouchMove, { passive: false });
  document.addEventListener('touchend',  onSubTouchEnd,  { once: true });
}

function onSubTouchMove(e) {
  if (!subTouchClone) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  const x = e.touches[0].clientX;
  subTouchClone.style.top = (y - subTouchOffY) + 'px';
  clearSubDragStates();
  const el = document.elementFromPoint(x, y);
  if (!el) return;
  const target = el.closest('.subitem[data-parent-id]');
  if (!target || safeId(target.dataset.parentId) !== subDragParentId) return;
  if (safeId(target.dataset.subId) === subDragSubId) return;
  const rect = target.getBoundingClientRect();
  target.classList.add(y < rect.top + rect.height / 2 ? 'sub-drag-over-above' : 'sub-drag-over-below');
}

function onSubTouchEnd(e) {
  document.removeEventListener('touchmove', onSubTouchMove);
  if (subTouchClone) { subTouchClone.remove(); subTouchClone = null; }
  clearSubDragStates();
  const y = e.changedTouches[0].clientY;
  const x = e.changedTouches[0].clientX;
  const el = document.elementFromPoint(x, y);
  if (el) {
    const target = el.closest('.subitem[data-parent-id]');
    if (target && safeId(target.dataset.parentId) === subDragParentId) {
      const targetSubId = safeId(target.dataset.subId);
      if (targetSubId !== null && targetSubId !== subDragSubId) {
        const rect = target.getBoundingClientRect();
        reorderSubs(subDragParentId, subDragSubId, targetSubId, y < rect.top + rect.height / 2);
      }
    }
  }
  subDragParentId = null; subDragSubId = null;
}
let confettiRaf = null;
let confettiParticles = [];

function launchConfetti() {
  stopConfetti();
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const colors = ['#A259FF','#1ABCFE','#0ACF83','#FF7262','#F24E1E','#fff'];

  function resize() {
    const inner = canvas.parentElement;
    canvas.width  = inner ? inner.offsetWidth  : 300;
    canvas.height = inner ? inner.offsetHeight : 200;
  }
  resize();

  // Spawn particles
  confettiParticles = Array.from({ length: 80 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height * 0.4 - canvas.height * 0.2,
    r: Math.random() * 5 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 2.5,
    vy: Math.random() * 2 + 1.5,
    rot: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    w: Math.random() * 8 + 4,
    h: Math.random() * 5 + 3,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.88;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      p.x  += p.vx;
      p.y  += p.vy;
      p.rot += p.spin;
      p.vy += 0.04; // gravity
      if (p.y > canvas.height + 20) {
        // recycle from top
        p.y  = -10;
        p.x  = Math.random() * canvas.width;
        p.vy = Math.random() * 1.5 + 1;
      }
    });
    confettiRaf = requestAnimationFrame(draw);
  }
  draw();

  // Auto-stop after 4 seconds
  setTimeout(stopConfetti, 4000);
}

function stopConfetti() {
  if (confettiRaf) { cancelAnimationFrame(confettiRaf); confettiRaf = null; }
  confettiParticles = [];
  const canvas = document.getElementById('confetti-canvas');
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

// ── Visibility sync — catch up timer display when returning from background ──
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;

  // Check for any repeat resets that fired while the app was closed
  checkOverdueResets();
  scheduleRepeatResets();

  // Resume audio context if it was suspended while backgrounded
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }

  // If timer is running, always show the unlock banner —
  // we can't know for sure if iOS kept audio unlocked
  if (speedRunning && speedEndTime) {
    showAudioUnlockBanner();
  }

  // Re-check repeat resets that may have fired while backgrounded
  let resetHappened = false;
  lists.forEach(list => {
    (list.items || []).forEach(it => {
      if (!it.done || !it.repeat || it.repeat.length === 0) return;
      // If the soonest reset time has already passed, reset now
      const delays = it.repeat.map(d => msUntilNextOccurrence(d));
      // msUntilNextOccurrence always returns future ms; if all delays are ~7 days
      // that means the reset already happened — check by seeing if any delay < 60s
      // Actually: a missed reset means the item is done but the timeout fired while
      // backgrounded (JS paused). Re-schedule handles the next one.
      // For missed ones: if today is a repeat day and item is done, reset it now.
      const todayDay = new Date().getDay();
      const now = new Date();
      const isPastMidnight = now.getHours() === 0 && now.getMinutes() <= 5; // within 5min of midnight
      if (it.repeat.includes(todayDay) && isPastMidnight) {
        it.done = false;
        it.subtasks.forEach(s => s.done = false);
        resetHappened = true;
      }
    });
  });
  if (resetHappened) {
    save();
    syncFromList();
    render();
  }
  scheduleRepeatResets();

  // Speed timer sync
  if (!speedRunning || !speedEndTime) return;
  const remainingMs = speedEndTime - Date.now();
  const remaining = Math.max(0, Math.ceil(remainingMs / 1000));
  speedSeconds = remaining;
  if (remainingMs <= 500) {
    fireAlarm();
  } else {
    updateTimerDisplay();
  }
});

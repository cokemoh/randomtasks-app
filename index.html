// One-time upload of all localStorage data to Supabase on first login.
// Gated by MIGRATED_KEY so it never runs again after the first success.
// Does NOT set the flag on partial failure so it retries on next login.
async function migrateToSupabase(user) {
  if (localStorage.getItem(MIGRATED_KEY) === '1') return;
  console.log('[Migration] Starting localStorage → Supabase…');
  syncToList();
  try {
    const ownedLists = lists.filter(l => !l.role || l.role === 'owner');
    // UUIDs are generated client-side so we include them directly — no collision risk
    await sbRest('lists', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=minimal',
      body:   ownedLists.map(l => ({ id: l.id, owner_id: user.id, name: l.name })),
    });

    const itemsPayload    = [];
    const subtasksPayload = [];
    for (const list of ownedLists) {
      const newListId = list.id;
      const rows = [
        ...(list.items        || []).map((it, idx) => ({ it, section: 'active',  pos: idx })),
        ...(list.backlogItems || []).map((it, idx) => ({ it, section: 'backlog', pos: idx })),
      ];
      for (const { it, section, pos } of rows) {
        itemsPayload.push({
          id: it.id, list_id: newListId, text: it.text, done: it.done,
          section, position: pos, repeat_days: it.repeat ?? [],
          completed_at: it.completedAt ? new Date(it.completedAt).toISOString() : null,
        });
        (it.subtasks || []).forEach((sub, si) =>
          subtasksPayload.push({ id: sub.id, item_id: it.id, text: sub.text, done: sub.done, position: si })
        );
      }
    }
    if (itemsPayload.length)    await sbRest('items',    { method: 'POST', prefer: 'resolution=merge-duplicates,return=minimal', body: itemsPayload });
    if (subtasksPayload.length) await sbRest('subtasks', { method: 'POST', prefer: 'resolution=merge-duplicates,return=minimal', body: subtasksPayload });

    localStorage.setItem(MIGRATED_KEY, '1');
    console.log('[Migration] Complete.');
  } catch(e) {
    console.warn('[Migration] Failed — will retry on next login:', e);
  }
}

// Replaces local state with authoritative cloud state after login.
// Also persists merged state back to localStorage for offline resilience.
async function loadFromSupabase() {
  if (!supabaseUser) return;
  try {
    // Load all lists this user can see (RLS filters to owned + shared)
    const cloudLists = await sbRest(
      `lists?select=id,name,share_token,owner_id&order=id`
    );

    // Find which lists this user is an editor on (not owner)
    // Gracefully handles the case where list_members table doesn't exist yet
    let sharedIds = new Set();
    try {
      const memberRows = await sbRest(`list_members?user_id=eq.${supabaseUser.id}&role=eq.editor&select=list_id`) || [];
      memberRows.forEach(r => sharedIds.add(r.list_id));
    } catch(e) { /* sharing not configured yet — all visible lists treated as owned */ }

    // Find which owned lists have at least one editor member (i.e. have been shared and joined)
    let ownerSharedIds = new Set();
    try {
      const ownedIds = (cloudLists || []).filter(cl => cl.owner_id === supabaseUser.id).map(cl => cl.id);
      if (ownedIds.length) {
        const memberRows = await sbRest(`list_members?list_id=in.(${ownedIds.join(',')})&role=eq.editor&select=list_id`) || [];
        memberRows.forEach(r => ownerSharedIds.add(r.list_id));
      }
    } catch(e) {}

    if (!cloudLists || !cloudLists.length) {
      clearLocalData();
    } else {
      const listIds    = cloudLists.map(l => l.id).join(',');
      const cloudItems = await sbRest(
        `items?select=*,subtasks(*)&list_id=in.(${listIds})&order=position`
      );

      lists = cloudLists.map(cl => {
        const li   = (cloudItems || []).filter(i => i.list_id === cl.id);
        const role = cl.owner_id === supabaseUser.id ? 'owner' : 'editor';
        const prev = lists.find(l => l.id === cl.id);
        return {
          id: cl.id, name: cl.name,
          icon: prev?.icon || 'app',
          share_token: role === 'owner' ? (cl.share_token || null) : null,
          shared: role === 'owner' ? ownerSharedIds.has(cl.id) : false,
          role,
          items:        li.filter(i => i.section === 'active').map(cloudItemToLocal),
          backlogItems: li.filter(i => i.section === 'backlog').map(cloudItemToLocal),
        };
      });

      if (_bootActiveListId && lists.find(l => l.id === _bootActiveListId)) {
        activeListId = _bootActiveListId;
      } else if (!lists.find(l => l.id === activeListId)) {
        activeListId = lists[0].id;
      }
      _bootActiveListId = null;

      const ownedLists = lists.filter(l => l.role === 'owner');
      localStorage.setItem(LISTS_KEY, JSON.stringify(ownedLists));
      localStorage.setItem(ACTIVE_LIST_KEY, String(activeListId));

      const nameInput = document.getElementById('list-name-input');
      if (nameInput) {
        nameInput.value = currentList().name;
        nameInput.readOnly = currentList().role === 'editor';
      }

      // Restore user-defined list order if one exists
      const savedOrder = localStorage.getItem(LIST_ORDER_KEY);
      if (savedOrder) {
        try {
          const order = JSON.parse(savedOrder);
          if (Array.isArray(order)) {
            lists.sort((a, b) => {
              const ai = order.indexOf(a.id), bi = order.indexOf(b.id);
              if (ai === -1 && bi === -1) return 0;
              if (ai === -1) return 1;
              if (bi === -1) return -1;
              return ai - bi;
            });
          }
        } catch(e) {}
      }

      syncFromList();
      render();
      renderDrawer();
      updateHeaderActions();
    }
  } catch(e) {
    console.warn('[Supabase] load failed:', e);
  }
  subscribeRealtime();
}

function cloudItemToLocal(ci) {
  return {
    id:          ci.id,
    text:        ci.text,
    done:        ci.done,
    completedAt: ci.completed_at ? new Date(ci.completed_at).getTime() : null,
    repeat:      ci.repeat_days || [],
    position:    ci.position,
    subtasks:    (ci.subtasks || [])
      .sort((a, b) => a.position - b.position)
      .map(s => ({ id: s.id, text: s.text, done: s.done })),
  };
}

// Debounced — coalesces rapid saves (typing, toggling) into one round-trip.
function scheduleSbSave() {
  if (!supabaseUser) return;
  clearTimeout(sbSaveTimer);
  sbSaveTimer = setTimeout(() => {
    sbSaveInFlight = saveToSupabase().finally(() => { sbSaveInFlight = null; });
  }, 1500);
}

async function saveToSupabase() {
  sbSaveTimer = null;
  if (!supabaseUser) return;
  syncToList();

  const ownedLists = lists.filter(l => !l.role || l.role === 'owner');
  if (ownedLists.length) {
    await sbRest('lists', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=minimal',
      body:   ownedLists.map(l => ({ id: l.id, owner_id: supabaseUser.id, name: l.name })),
    }).catch(e => console.warn('[Supabase] lists save failed:', e.message || e));
  }

  const itemsPayload    = [];
  const subtasksPayload = [];
  for (const list of lists) {
    const rows = [
      ...(list.items        || []).map((it, idx) => ({ it, section: 'active',  pos: idx })),
      ...(list.backlogItems || []).map((it, idx) => ({ it, section: 'backlog', pos: idx })),
    ];
    for (const { it, section, pos } of rows) {
      itemsPayload.push({
        id: it.id, list_id: list.id, text: it.text, done: it.done,
        section, position: pos, repeat_days: it.repeat ?? [],
        completed_at: it.completedAt ? new Date(it.completedAt).toISOString() : null,
      });
      (it.subtasks || []).forEach((sub, si) =>
        subtasksPayload.push({ id: sub.id, item_id: it.id, text: sub.text, done: sub.done, position: si })
      );
    }
  }
  if (itemsPayload.length)
    await sbRest('items', { method: 'POST', prefer: 'resolution=merge-duplicates,return=minimal', body: itemsPayload })
      .catch(e => console.warn('[Supabase] items save failed:', e.message || e));
  if (subtasksPayload.length)
    await sbRest('subtasks', { method: 'POST', prefer: 'resolution=merge-duplicates,return=minimal', body: subtasksPayload })
      .catch(e => console.warn('[Supabase] subtasks save failed:', e.message || e));

  // Delete items/subtasks that no longer exist locally
  for (const list of lists) {
    const keptIds = itemsPayload.filter(i => i.list_id === list.id).map(i => i.id);
    const q = keptIds.length
      ? `items?list_id=eq.${list.id}&id=not.in.(${keptIds.join(',')})`
      : `items?list_id=eq.${list.id}`;
    await sbRest(q, { method: 'DELETE' })
      .catch(e => console.warn('[Supabase] items delete sync failed:', e.message || e));
  }
  const keptItemIds = itemsPayload.map(i => i.id);
  if (keptItemIds.length) {
    const keepSubIds = subtasksPayload.map(s => s.id);
    const sq = keepSubIds.length
      ? `subtasks?item_id=in.(${keptItemIds.join(',')})&id=not.in.(${keepSubIds.join(',')})`
      : `subtasks?item_id=in.(${keptItemIds.join(',')})`;
    await sbRest(sq, { method: 'DELETE' })
      .catch(e => console.warn('[Supabase] subtasks delete sync failed:', e.message || e));
  }
}

async function checkJoinParam() {

  try {
    const rows = await fetch(`${SUPABASE_URL}/rest/v1/rpc/lookup_share_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_token: token }),
    }).then(r => r.json());
    if (rows && rows.length) listName = rows[0].name;
  } catch(e) { /* show modal anyway */ }

  if (supabaseUser && pendingJoinToken) {
    await acceptJoin();
  } else if (pendingJoinToken) {
    showJoinModal(pendingJoinToken, listName);
  }
}

function showJoinModal(token, listName) {
  const titleEl   = document.getElementById('join-modal-title');
  const subEl     = document.getElementById('join-modal-sub');
  const actionsEl = document.getElementById('join-modal-actions');

  if (supabaseUser) {
    titleEl.textContent   = `Join "${listName}"?`;
    subEl.textContent     = "You'll be added as an editor and can collaborate on this list.";
    actionsEl.innerHTML   = `
      <button class="join-accept-btn" onclick="acceptJoin()">Yes, join</button>
      <button class="join-dismiss-btn" onclick="dismissJoin()">No, dismiss</button>`;
  } else {
    titleEl.textContent   = `Join "${listName}"`;
    subEl.textContent     = 'Sign in with Google to join this shared list.';
    actionsEl.innerHTML   = `
      <button class="join-accept-btn" onclick="signInToJoin()">Sign in with Google</button>
      <button class="join-dismiss-btn" onclick="dismissJoin()">Dismiss</button>`;
  }

  document.getElementById('join-modal').classList.add('open');
  openModal();
}

function dismissJoin() {
  pendingJoinToken = null;
  document.getElementById('join-modal').classList.remove('open');
  closeModal();
}

async function signInToJoin() {
  if (pendingJoinToken) localStorage.setItem('rt-pending-join', pendingJoinToken);
  dismissJoin();
  await signIn();
}

async function acceptJoin() {
  if (!pendingJoinToken || !supabaseUser) return;
  const token = pendingJoinToken;
  dismissJoin();
  try {
    const result = await sbRest('rpc/join_shared_list', {
      method: 'POST', body: { p_token: token },
    });
    if (result && result.error) {
      console.warn('[Join] error:', result.error);
      return;
    }
    await loadFromSupabase();
    if (result) switchList(result);
  } catch(e) { console.warn('[Join] failed:', e); }
}

const APP_ICON_SVG_MINI = `<svg width="30" height="30" viewBox="181.5 14.5 308 308" fill="none"><g transform="rotate(-6, 340, 210)"><rect x="258" y="84" width="180" height="222" rx="22" fill="#4c1d95" opacity="0.3"/><rect x="250" y="76" width="180" height="222" rx="20" fill="#7c3aed"/><rect x="285" y="64" width="110" height="26" rx="5" fill="#a78bfa"/><rect x="315" y="39" width="50" height="28" rx="4" fill="none" stroke="#a78bfa" stroke-width="12"/><circle cx="278" cy="148" r="5" fill="white"/><line x1="292" y1="148" x2="390" y2="148" stroke="white" stroke-width="5" stroke-linecap="round"/><circle cx="278" cy="175" r="5" fill="white"/><line x1="292" y1="175" x2="375" y2="175" stroke="white" stroke-width="5" stroke-linecap="round"/><circle cx="278" cy="202" r="5" fill="white"/><line x1="292" y1="202" x2="385" y2="202" stroke="white" stroke-width="5" stroke-linecap="round"/><circle cx="278" cy="229" r="5" fill="white"/><line x1="292" y1="229" x2="368" y2="229" stroke="white" stroke-width="5" stroke-linecap="round"/></g></svg>`;
const ICON_PRESETS = ['📝','📋','✅','🎯','🏠','💼','🛒','📚','💡','🔥','⭐','🎉','💪','🎨','🌟','🍕','💻','🌱','🎵','🧘'];
let pickerListId = null;

let lists = [];
let activeListId = null;
let pendingDeleteListId = null;
let _bootActiveListId = null; // saved once at boot before any save() can overwrite it

function currentList() { return lists.find(l => l.id === activeListId) || lists[0]; }

function migrateLocalIdsToUUIDs() {
  if (localStorage.getItem(UUID_MIGRATION_KEY) === '1') return;
  const raw = localStorage.getItem(LISTS_KEY);
  if (raw) {
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) { parsed = null; }
    if (Array.isArray(parsed) && parsed.length && typeof parsed[0].id === 'number') {
      const idMap = {};
      const convertItem = it => {
        const newId = crypto.randomUUID();
        idMap[it.id] = newId;
        return {
          ...it, id: newId,
          subtasks: (it.subtasks || []).map(s => ({ ...s, id: crypto.randomUUID() })),
        };
      };
      const converted = parsed.map(l => {
        const newId = crypto.randomUUID();
        idMap[l.id] = newId;
        return {
          ...l, id: newId,
          items:        (l.items        || []).map(convertItem),
          backlogItems: (l.backlogItems || []).map(convertItem),
        };
      });
      localStorage.setItem(LISTS_KEY, JSON.stringify(converted));
      const savedActive = localStorage.getItem(ACTIVE_LIST_KEY);
      const oldActive = savedActive ? parseInt(savedActive, 10) : NaN;
      if (!isNaN(oldActive) && idMap[oldActive]) localStorage.setItem(ACTIVE_LIST_KEY, idMap[oldActive]);
      localStorage.removeItem(MIGRATED_KEY);
      console.log('[UUID Migration] Converted integer IDs to UUIDs and cleared migration flag.');
    }
  }
  localStorage.setItem(UUID_MIGRATION_KEY, '1');
}

function save() {
  syncToList();
  const ownedLists = lists.filter(l => !l.role || l.role === 'owner');
  localStorage.setItem(LISTS_KEY, JSON.stringify(ownedLists));
  localStorage.setItem(ACTIVE_LIST_KEY, String(activeListId));
  scheduleSbSave();
}

function load() {
  try {
    const savedLists = localStorage.getItem(LISTS_KEY);
    const savedActiveId = localStorage.getItem(ACTIVE_LIST_KEY);
    _bootActiveListId = safeId(savedActiveId); // capture before any save() can overwrite

    if (savedLists) {
      const parsed = JSON.parse(savedLists);
      lists = validateLists(parsed) || [];
    }

    if (!lists || lists.length === 0) {
      lists = [{ id: mkId(), name: 'Tasks', items: [], backlogItems: [], icon: 'app' }];
    }

    activeListId = savedActiveId ? (safeId(savedActiveId) ?? lists[0].id) : lists[0].id;
    if (!lists.find(l => l.id === activeListId)) activeListId = lists[0].id;
  } catch(e) {
    lists = [{ id: mkId(), name: 'Tasks', items: [], backlogItems: [], icon: 'app' }];
    activeListId = lists[0].id;
  }

  // Sync working variables from current list
  syncFromList();
}

function syncFromList() {
  const cl = currentList();
  items        = cl.items || [];
  backlogItems = cl.backlogItems || [];
  pickedId         = null;
  pickedBacklogId  = null;
  editingId        = null;
  editingSubId     = null;
  backlogAddOpen   = false;
  syncDataLayer();
}

function syncToList() {
  const cl = currentList();
  if (!cl) return;
  cl.items        = items;
  cl.backlogItems = backlogItems;
}

// ── Data layer helpers ─────────────────────────────────────────────────────

function toDataSubtask(raw) {
  return {
    id:       raw.id,
    item_id:  raw.item_id ?? null,
    text:     raw.text    ?? '',
    done:     raw.done    ?? false,
    position: raw.position ?? 0,
  };
}

// Converts the existing localStorage item shape to the canonical data shape.
// Field renames: repeat → repeat_days, completedAt → completed_at.
// UI fields (expanded, repeatOpen, addingSubtask, subInput) are stripped —
// they live in uiState instead.
function toDataItem(raw, section) {
  return {
    id:           raw.id,
    list_id:      activeListId,
    text:         raw.text          ?? '',
    done:         raw.done          ?? false,
    section:      section           ?? raw.section ?? 'active',
    position:     raw.position      ?? 0,
    repeat_days:  raw.repeat        ?? raw.repeat_days ?? [],
    completed_at: raw.completedAt   ?? raw.completed_at ?? null,
    subtasks:     (raw.subtasks     ?? []).map(toDataSubtask),
  };
}

// Returns the UI state entry for an item, initialising defaults on first access.
function getUI(id) {
  if (!uiState.has(id)) {
    uiState.set(id, { expanded: false, repeatOpen: false, addingSubtask: false, subInput: '' });
  }
  return uiState.get(id);
}

// Updates UI state and re-renders. Never triggers a save.
function setUI(id, patch) {
  uiState.set(id, { ...getUI(id), ...patch });
  render();
}

// Removes stale uiState entries for items that no longer exist.
function pruneUI() {
  const live = new Set([...dataItems, ...dataBacklog].map(i => i.id));
  for (const id of uiState.keys()) {
    if (!live.has(id)) uiState.delete(id);
  }
}

// Merges a DataItem with its uiState entry into the shape render functions expect.
// Render functions consume this — they don't touch dataItems or uiState directly.
function toViewModel(dataItem) {
  const ui = getUI(dataItem.id);
  return {
    id:            dataItem.id,
    text:          dataItem.text,
    done:          dataItem.done,
    section:       dataItem.section,
    repeat:        dataItem.repeat_days,
    completedAt:   dataItem.completed_at,
    subtasks:      dataItem.subtasks,
    expanded:      ui.expanded,
    repeatOpen:    ui.repeatOpen,
    addingSubtask: ui.addingSubtask,
    subInput:      ui.subInput,
  };
}

function getActiveViewModels()  { return dataItems.map(toViewModel); }
function getBacklogViewModels() { return dataBacklog.map(toViewModel); }

// Asserts that a view model produced by the new data layer matches the
// original item from the existing layer. Logs a warning if anything diverges.
// Remove this once the render functions are fully migrated to toViewModel().
function assertViewModelMatch(original, vm) {
  if (!vm) { console.warn('[DataLayer] no view model for item', original.id); return; }
  const checks = [
    ['text',        original.text,                          vm.text],
    ['done',        original.done,                          vm.done],
    ['completedAt', original.completedAt   ?? null,         vm.completedAt],
    ['repeat',      JSON.stringify(original.repeat ?? []),  JSON.stringify(vm.repeat ?? [])],
  ];
  for (const [field, a, b] of checks) {
    if (a !== b) {
      console.warn(`[DataLayer] mismatch on "${field}" for item ${original.id}:`, a, '≠', b);
    }
  }
}

// Fast sync — rebuilds dataItems / dataBacklog from items / backlogItems.
// Initialises uiState for items that are new (not yet tracked); existing
// entries are left untouched so setUI() writes survive across renders.
function rebuildDataLayer() {
  dataItems = items.map(it => {
    if (!uiState.has(it.id)) {
      uiState.set(it.id, { expanded: false, repeatOpen: false, addingSubtask: false, subInput: '' });
    }
    return toDataItem(it, 'active');
  });
  dataBacklog = backlogItems.map(it => {
    if (!uiState.has(it.id)) {
      uiState.set(it.id, { expanded: false, repeatOpen: false, addingSubtask: false, subInput: '' });
    }
    return toDataItem(it, 'backlog');
  });
  pruneUI();
}

// Called from syncFromList() on list load / list switch.
// Runs the full rebuild plus assertions to verify the data layer matches originals.
function syncDataLayer() {
  rebuildDataLayer();
  items.forEach(original => {
    const data = dataItems.find(d => d.id === original.id);
    assertViewModelMatch(original, data ? toViewModel(data) : null);
  });
  backlogItems.forEach(original => {
    const data = dataBacklog.find(d => d.id === original.id);
    assertViewModelMatch(original, data ? toViewModel(data) : null);
  });
}

function switchList(id) {
  syncToList();
  save();
  activeListId = id;
  localStorage.setItem(ACTIVE_LIST_KEY, String(id));
  syncFromList();
  const nameInput = document.getElementById('list-name-input');
  if (nameInput) {
    nameInput.value = currentList().name;
    nameInput.readOnly = currentList().role === 'editor';
  }
  closeDrawer();
  render();
  renderBacklog();
  updateHeaderActions();
}

function createNewList() {
  syncToList();
  const newList = { id: mkId(), name: 'New List', items: [], backlogItems: [], role: 'owner', icon: 'app' };
  lists.push(newList);
  activeListId = newList.id;
  syncFromList();
  save();
  closeDrawer();
  render();
  renderBacklog();
  // Focus the title to rename immediately
  setTimeout(() => {
    const input = document.getElementById('list-name-input');
    if (input) { input.value = 'New List'; input.focus(); input.select(); }
  }, 60);
}

function renameCurrentList(name) {
  const cl = currentList();
  if (!cl || cl.role === 'editor') return;
  cl.name = name.trim() || 'Untitled';
  save();
  renderDrawer();
}

function openConfirmDeleteList(id) {
  const list = lists.find(l => l.id === id);
  if (!list || list.role === 'editor') return;
  const ownedLists = lists.filter(l => !l.role || l.role === 'owner');
  if (ownedLists.length <= 1) return;
  pendingDeleteListId = id;
  const body = document.getElementById('confirm-delete-list-modal-body');
  if (body) body.textContent = `"${list.name}" and all its tasks will be permanently deleted. This cannot be undone.`;
  document.getElementById('confirm-delete-list-modal').classList.add('open');
  openModal();
}

function cancelConfirmDeleteList() {
  pendingDeleteListId = null;
  document.getElementById('confirm-delete-list-modal').classList.remove('open');
  closeModal();
}

async function confirmDeleteList() {
  const id = pendingDeleteListId;
  cancelConfirmDeleteList();
  if (!id) return;
  const list = lists.find(l => l.id === id);
  if (!list) return;
  lists = lists.filter(l => l.id !== id);
  if (activeListId === id) {
    activeListId = lists[0].id;
    syncFromList();
    const nameInput = document.getElementById('list-name-input');
    if (nameInput) nameInput.value = currentList().name;
    render();
    renderBacklog();
  }
  save();
  renderDrawer();
  if (supabaseUser) {
    try { await sbRest(`lists?id=eq.${id}`, { method: 'DELETE' }); }
    catch(e) { console.warn('[Supabase] delete list failed:', e); }
  }
}

// ── Drawer ─────────────────────────────────────────────────────────────────
function openDrawer() {
  syncToList(); // make sure counts are fresh
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

function renderDrawerListItem(list) {
  const active     = (list.items || []).filter(i => !i.done).length;
  const isActive   = list.id === activeListId;
  const isOwner    = !list.role || list.role === 'owner';
  const ownedCount = lists.filter(l => !l.role || l.role === 'owner').length;
  const canDelete  = isOwner && ownedCount > 1;
  const icon       = list.icon || 'app';
  const isAppIcon  = icon === 'app';
  const iconContent = renderIconContent(icon);
  const iconStyle   = 'background:transparent';
  const iconEl = isOwner
    ? `<button class="drawer-list-icon" style="${iconStyle}" onclick="event.stopPropagation();openIconPicker('${list.id}')" aria-label="Change icon">${iconContent}</button>`
    : `<div class="drawer-list-icon" style="${iconStyle}">${iconContent}</div>`;
  return `
    <div class="drawer-list-item${isActive ? ' active' : ''}${isOwner ? '' : ' shared-list'}"
         data-list-id="${list.id}" ${isOwner ? 'draggable="true"' : ''}
         onclick="switchList('${list.id}')">
      <div class="drawer-drag-handle" onclick="event.stopPropagation()"
           ${isOwner ? `ontouchstart="listDragTouchStart(event,'${list.id}')"` : ''}>
        <svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor">
          <circle cx="3" cy="2" r="1.5"/><circle cx="7" cy="2" r="1.5"/>
          <circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>
          <circle cx="3" cy="14" r="1.5"/><circle cx="7" cy="14" r="1.5"/>
        </svg>
      </div>
      ${iconEl}
      <div class="drawer-list-info">
        <div class="drawer-list-name">${esc(list.name)}</div>
        <div class="drawer-list-count">${active} active</div>
      </div>
      ${canDelete ? `<button class="drawer-list-delete" onclick="event.stopPropagation();openConfirmDeleteList('${list.id}')" aria-label="Delete list">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>` : ''}
    </div>`;
}

function renderDrawer() {
  const container = document.getElementById('drawer-lists');
  if (!container) return;
  const myLists     = lists.filter(l => (l.role === 'owner' || !l.role) && !l.shared);
  const sharedLists = lists.filter(l => l.role === 'editor' || (l.role === 'owner' && l.shared));
  let html = myLists.map(renderDrawerListItem).join('');
  if (sharedLists.length) {
    html += `<div class="drawer-section-label">Shared lists</div>`;
    html += sharedLists.map(renderDrawerListItem).join('');
  }
  container.innerHTML = html;
  initListDragListeners();
}

// ── List icon helpers ──────────────────────────────────────────────────────
function renderIconContent(icon) {
  if (!icon || icon === 'app') return APP_ICON_SVG_MINI;
  if (icon.startsWith('data:')) return `<img src="${icon}" width="28" height="28" alt="" style="object-fit:contain;border-radius:4px;display:block">`;
  return esc(icon);
}

async function blobToDataUrl(url) {
  const res  = await fetch(url);
  const blob = await res.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// ── List icon picker ───────────────────────────────────────────────────────
function openIconPicker(listId) {
  pickerListId = listId;
  const list = lists.find(l => l.id === listId);
  if (!list) return;
  const currentIcon = list.icon || 'app';

  const appIconSvg = `<svg width="24" height="24" viewBox="181.5 14.5 308 308" fill="none"><g transform="rotate(-6, 340, 210)"><rect x="258" y="84" width="180" height="222" rx="22" fill="#4c1d95" opacity="0.3"/><rect x="250" y="76" width="180" height="222" rx="20" fill="#7c3aed"/><rect x="285" y="64" width="110" height="26" rx="5" fill="#a78bfa"/><rect x="315" y="39" width="50" height="28" rx="4" fill="none" stroke="#a78bfa" stroke-width="12"/><circle cx="278" cy="148" r="5" fill="white"/><line x1="292" y1="148" x2="390" y2="148" stroke="white" stroke-width="5" stroke-linecap="round"/><circle cx="278" cy="175" r="5" fill="white"/><line x1="292" y1="175" x2="375" y2="175" stroke="white" stroke-width="5" stroke-linecap="round"/><circle cx="278" cy="202" r="5" fill="white"/><line x1="292" y1="202" x2="385" y2="202" stroke="white" stroke-width="5" stroke-linecap="round"/><circle cx="278" cy="229" r="5" fill="white"/><line x1="292" y1="229" x2="368" y2="229" stroke="white" stroke-width="5" stroke-linecap="round"/></g></svg>`;

  let gridHtml = `<button class="icon-picker-btn${currentIcon === 'app' ? ' selected' : ''}" onclick="setListIcon('${listId}','app')" aria-label="App icon">${appIconSvg}</button>`;
  gridHtml += ICON_PRESETS.map(e =>
    `<button class="icon-picker-btn${currentIcon === e ? ' selected' : ''}" onclick="setListIcon('${listId}','${e}')">${e}</button>`
  ).join('');
  document.getElementById('icon-picker-grid').innerHTML = gridHtml;

  const input = document.getElementById('icon-picker-input');
  // Show current icon in the contenteditable field
  if (currentIcon === 'app') {
    input.innerHTML = '';
  } else if (currentIcon.startsWith('data:')) {
    input.innerHTML = `<img src="${currentIcon}" style="height:1.4em;border-radius:3px;vertical-align:middle">`;
  } else {
    input.textContent = currentIcon;
  }

  input.oninput = async () => {
    const img = input.querySelector('img');
    if (img) {
      // Genmoji or pasted image — convert blob to persistent data URL
      const src = img.src;
      try {
        const dataUrl = src.startsWith('data:') ? src : await blobToDataUrl(src);
        setListIcon(listId, dataUrl, true);
      } catch(e) { console.warn('Genmoji capture failed', e); }
    } else {
      const chars = [...input.textContent];
      if (chars.length) setListIcon(listId, chars.slice(0, 2).join(''), true);
    }
  };

  document.getElementById('icon-picker-modal').classList.add('open');
  openModal();
}

function closeIconPicker() {
  document.getElementById('icon-picker-modal').classList.remove('open');
  closeModal();
  pickerListId = null;
}

function setListIcon(listId, icon, keepOpen) {
  const list = lists.find(l => l.id === listId);
  if (!list || list.role === 'editor') return;
  list.icon = icon;
  save();
  renderDrawer();
  if (listId === activeListId) updateTopBarIcon();
  if (!keepOpen) closeIconPicker();
}

function updateTopBarIcon() {
  const el = document.getElementById('top-bar-list-icon');
  if (!el) return;
  const list = currentList();
  const icon = list?.icon || 'app';
  const isOwner = !list?.role || list?.role === 'owner';
  if (icon === 'app') {

    el.style.fontSize = '';

function openTopBarIconPicker() {

// ── Drawer list drag-to-reorder ────────────────────────────────────────────
let listDragSrcId = null;

function initListDragListeners() {
  const container = document.getElementById('drawer-lists');
  if (!container) return;

  container.addEventListener('dragstart', e => {
    const item = e.target.closest('.drawer-list-item[draggable="true"]');
    if (!item) return;
    listDragSrcId = safeId(item.dataset.listId);
    if (listDragSrcId === null) return;
    item.classList.add('list-dragging');
    e.dataTransfer.effectAllowed = 'move';
  });

  container.addEventListener('dragend', () => {
    listDragSrcId = null;
    container.querySelectorAll('.drawer-list-item').forEach(el =>
      el.classList.remove('list-dragging', 'list-drag-over-above', 'list-drag-over-below')
    );
  });

  container.addEventListener('dragover', e => {
    e.preventDefault();
    const item = e.target.closest('.drawer-list-item[draggable="true"]');
    container.querySelectorAll('.drawer-list-item').forEach(el =>
      el.classList.remove('list-drag-over-above', 'list-drag-over-below')
    );
    if (!listDragSrcId) return;
    if (!item || safeId(item.dataset.listId) === listDragSrcId) {
      // Cursor is in container padding or over the dragged item itself.
      // If above the first non-source item, show insert-before indicator on it.
      const first = container.querySelector('.drawer-list-item[draggable="true"]');
      if (first && safeId(first.dataset.listId) !== listDragSrcId &&
          e.clientY < first.getBoundingClientRect().bottom) {
        first.classList.add('list-drag-over-above');
      }
      return;
    }
    const rect = item.getBoundingClientRect();
    item.classList.add(e.clientY < rect.top + rect.height / 2 ? 'list-drag-over-above' : 'list-drag-over-below');
  });

  container.addEventListener('dragleave', e => {
    const item = e.target.closest('.drawer-list-item');
    if (item && !item.contains(e.relatedTarget))
      item.classList.remove('list-drag-over-above', 'list-drag-over-below');
  });

  container.addEventListener('drop', e => {
    e.preventDefault();
    if (!listDragSrcId) return;
    const item = e.target.closest('.drawer-list-item[draggable="true"]');
    if (!item || safeId(item.dataset.listId) === listDragSrcId) {
      // Cursor in container padding or over source — insert before first item if above it.
      const first = container.querySelector('.drawer-list-item[draggable="true"]');
      const firstId = first ? safeId(first.dataset.listId) : null;
      if (firstId !== null && firstId !== listDragSrcId &&
          e.clientY < first.getBoundingClientRect().bottom) {
        reorderLists(listDragSrcId, firstId, true);
      }
      return;
    }
    const targetId = safeId(item.dataset.listId);
    if (targetId === null) return;
    const rect = item.getBoundingClientRect();
    reorderLists(listDragSrcId, targetId, e.clientY < rect.top + rect.height / 2);
  });
}

// ── List touch drag ────────────────────────────────────────────────────────
let listTouchSrcId  = null;
let listTouchClone  = null;
let listTouchOffY   = 0;

function listDragTouchStart(e, id) {
  if (e.touches.length !== 1) return;
  if (listTouchSrcId !== null) return;
  e.stopPropagation();
  listTouchSrcId = id;
  const item = e.target.closest('.drawer-list-item');
  if (!item) return;
  const rect = item.getBoundingClientRect();
  listTouchOffY = e.touches[0].clientY - rect.top;
  listTouchClone = item.cloneNode(true);
  listTouchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:9999;pointer-events:none;opacity:0.85;box-shadow:0 4px 20px rgba(0,0,0,0.5);border-radius:10px;transition:none;background:var(--surface-hover);`;
  document.body.appendChild(listTouchClone);
  item.classList.add('list-dragging');
  document.addEventListener('touchmove', onListTouchMove, { passive: false });
  document.addEventListener('touchend',  onListTouchEnd,  { once: true });
}

function onListTouchMove(e) {
  if (!listTouchClone) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  const x = e.touches[0].clientX;
  listTouchClone.style.top = (y - listTouchOffY) + 'px';
  const container = document.getElementById('drawer-lists');
  if (!container) return;
  container.querySelectorAll('.drawer-list-item').forEach(el =>
    el.classList.remove('list-drag-over-above', 'list-drag-over-below')
  );
  const el = document.elementFromPoint(x, y);
  if (!el) return;
  const target = el.closest('.drawer-list-item[draggable="true"]');
  if (!target || safeId(target.dataset.listId) === listTouchSrcId) {
    // Touch is in container padding or over the source item — show insert-before
    // indicator on the first non-source item if the touch is above it.
    const first = container.querySelector('.drawer-list-item[draggable="true"]');
    if (first && safeId(first.dataset.listId) !== listTouchSrcId &&
        y < first.getBoundingClientRect().bottom) {
      first.classList.add('list-drag-over-above');
    }
    return;
  }
  const rect = target.getBoundingClientRect();
  target.classList.add(y < rect.top + rect.height / 2 ? 'list-drag-over-above' : 'list-drag-over-below');
}

function onListTouchEnd(e) {
  document.removeEventListener('touchmove', onListTouchMove);
  if (listTouchClone) { listTouchClone.remove(); listTouchClone = null; }
  const container = document.getElementById('drawer-lists');
  if (container) {
    container.querySelectorAll('.drawer-list-item').forEach(el =>
      el.classList.remove('list-dragging', 'list-drag-over-above', 'list-drag-over-below')
    );
  }
  const y = e.changedTouches[0].clientY;
  const x = e.changedTouches[0].clientX;
  const el = document.elementFromPoint(x, y);
  const target = el?.closest('.drawer-list-item[draggable="true"]');
  if (target && safeId(target.dataset.listId) !== listTouchSrcId) {
    const targetId = safeId(target.dataset.listId);
    const rect = target.getBoundingClientRect();
    if (targetId !== null) reorderLists(listTouchSrcId, targetId, y < rect.top + rect.height / 2);
  } else {
    // Touch is in container padding or over the source — insert before the first
    // non-source item if the touch is above it.
    const first = container?.querySelector('.drawer-list-item[draggable="true"]');
    const firstId = first ? safeId(first.dataset.listId) : null;
    if (firstId !== null && firstId !== listTouchSrcId &&
        y < first.getBoundingClientRect().bottom) {
      reorderLists(listTouchSrcId, firstId, true);
    }
  }
  listTouchSrcId = null;
}

function reorderLists(srcId, targetId, insertBefore) {
  const srcIdx = lists.findIndex(l => l.id === srcId);
  if (srcIdx === -1) return;
  const [moved] = lists.splice(srcIdx, 1);
  const tIdx = lists.findIndex(l => l.id === targetId);
  if (tIdx === -1) { lists.push(moved); }
  else lists.splice(insertBefore ? tIdx : tIdx + 1, 0, moved);
  localStorage.setItem(LIST_ORDER_KEY, JSON.stringify(lists.map(l => l.id)));
  save();
  renderDrawer();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  syncToList();
  rebuildDataLayer();
  const vms    = getActiveViewModels();
  const active = vms.filter(i => !i.done);
  const done   = vms.filter(i => i.done);
  const ordered = [...active, ...done];
  document.getElementById('header-sub').textContent = `${active.length} active · ${done.length} done`;
  updateTopBarIcon();
  const pickable = vms.filter(i => {
    if (i.done) return false;
    if (!i.subtasks || i.subtasks.length === 0) return true;
    return i.subtasks.some(s => !s.done);
  });
  document.getElementById('pick-btn').disabled = pickable.length === 0;

  // Pick banner
  const pickedItem = vms.find(i => i.id === pickedId && !i.done);
  const bw = document.getElementById('banner-wrap');
  if (pickedItem) {
    bw.style.display = '';
    document.getElementById('banner-text').textContent = pickedItem.text;
  } else {
    bw.style.display = 'none';
    if (!pickedItem) pickedId = null;
  }

  // Footer
  const footer = document.getElementById('footer');
  footer.style.display = done.length ? '' : 'none';
  const dc = document.getElementById('done-count');
  if (dc) dc.textContent = done.length;

  // Number active items
  const nums = {};
  let n = 1;
  ordered.forEach(it => { if (!it.done) nums[it.id] = n++; });

  // List — active items only
  const container = document.getElementById('list-container');
  const completedContainer = document.getElementById('completed-container');
  let html = '';
  let completedHtml = '';

  if (active.length === 0) {
    html = `<div class="empty">
      <div class="empty-icon">✦</div>
      <div class="empty-text">Nothing to do</div>
      <div class="empty-sub">Add a task above to get started</div>
    </div>`;
  } else {
    html += `<div class="section-label">Active</div>`;
  }

  ordered.forEach((item, idx) => {
    const totalSubs = item.subtasks.length;
    const doneSubs  = item.subtasks.filter(s => s.done).length;
    const hasSubs   = totalSubs > 0;
    const pct       = hasSubs ? (doneSubs / totalSubs * 100) : 0;
    const isPicked  = item.id === pickedId && !item.done;
    const showSubs  = (hasSubs || item.addingSubtask) && item.expanded;
    const isDone    = item.done;

    const noSubsClass = (!hasSubs && !item.addingSubtask) ? ' no-subs' : '';
    const pickedClass = isPicked ? ' picked-card' : '';

    // Subtask rows
    let subHtml = '';
    if (hasSubs || item.addingSubtask) {
      let subRows = '';
      item.subtasks.forEach(sub => {
        const isEditingSub = (editingId === item.id && editingSubId === sub.id);
        const subTextHtml = isEditingSub
          ? `<div class="edit-field" onclick="event.stopPropagation()" style="flex:1;min-width:0">
               <input class="sub-edit-input" id="edit-sub-${item.id}-${sub.id}" value="${esc(sub.text)}"
                 onkeydown="handleSubEditKey(event,${item.id},${sub.id})"/>
               <button class="edit-confirm" onclick="event.stopPropagation();confirmSubEdit('${item.id}','${sub.id}')">✓</button>
               <button class="edit-cancel" onclick="event.stopPropagation();cancelEdit()">×</button>
             </div>`
          : `<span class="subitem-text" ondblclick="event.stopPropagation();startSubEdit('${item.id}','${sub.id}')">${esc(sub.text)}</span>`;
        const subEditBtn = !isEditingSub
          ? `<button class="sub-icon-btn" onclick="event.stopPropagation();startSubEdit('${item.id}','${sub.id}')" style="color:var(--text-secondary)">
               <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
             </button>` : '';
        subRows += `
          <div class="subitem${sub.done ? ' done' : ''}" data-sub-id="${sub.id}" data-parent-id="${item.id}" onclick="${isEditingSub ? '' : `toggleSub('${item.id}','${sub.id}')`}">
            <div class="sub-drag-handle" ontouchstart="subDragTouchStart(event,'${item.id}','${sub.id}')" onmousedown="subDragMouseStart(event,'${item.id}','${sub.id}')">
              <svg width="8" height="12" viewBox="0 0 10 16" fill="currentColor">
                <circle cx="3" cy="2" r="1.5"/><circle cx="7" cy="2" r="1.5"/>
                <circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>
                <circle cx="3" cy="14" r="1.5"/><circle cx="7" cy="14" r="1.5"/>
              </svg>
            </div>
            <div class="sub-checkbox">
              <svg class="sub-checkmark" viewBox="0 0 8 8" fill="none">
                <polyline points="1,4 3,6.5 7,1.5" stroke="#1E1E1E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            ${subTextHtml}
            ${subEditBtn}
            <button class="sub-icon-btn" onclick="event.stopPropagation();deleteSub('${item.id}','${sub.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
          </div>`;
      });
      if (item.addingSubtask) {
        subRows += `
          <div class="sub-add-row" onclick="event.stopPropagation()">
            <input class="sub-add-input" id="sub-input-${item.id}" placeholder="New subtask…"
              onkeydown="handleSubKey(event,${item.id})"/>
            <button class="sub-add-confirm" onclick="confirmSub('${item.id}')">✓</button>
            <button class="sub-add-cancel" onclick="cancelSub('${item.id}')">×</button>
          </div>`;
      } else if (hasSubs && item.expanded && !isDone) {
        subRows += `
          <div class="sub-add-trigger" onclick="event.stopPropagation();openSubAdd('${item.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Add subtask
          </div>`;
      }
      const maxH = showSubs ? `${(totalSubs + (item.addingSubtask ? 1 : 0)) * 56 + 48}px` : '0px';
      subHtml = `<div class="subtasks" id="subs-${item.id}" style="max-height:${maxH}">${subRows ? `<div class="subtasks-inner">${subRows}</div>` : ''}</div>`;
    }

    // Progress
    const progressHtml = (hasSubs && !isDone) ? `<div class="progress-row"><div class="progress-fill" style="width:${pct}%"></div></div>` : '';

    const numInner = isPicked ? `⭐` : nums[item.id];

    const subHint = (hasSubs && !isDone) ? `<div class="item-sub-hint">${doneSubs}/${totalSubs} subtasks</div>` : '';

    // Inline edit for parent task
    const isEditing = (editingId === item.id && editingSubId === null);

    // Expand/add-sub btn — shows + chevron when no subtasks (opens add input), expand chevron when subtasks exist
    const expandHtml = (!isDone && !isEditing)
      ? (hasSubs || item.addingSubtask)
        ? `<button class="expand-btn${item.expanded ? ' open' : ''}" onclick="event.stopPropagation();toggleExpand('${item.id}')" aria-label="${item.expanded ? 'Collapse' : 'Expand'} subtasks">
             <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
           </button>`
        : `<button class="expand-btn add-sub-chevron" onclick="event.stopPropagation();openSubAdd('${item.id}')" title="Add subtask" aria-label="Add subtask">
             <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
           </button>`
      : '';
    const itemBodyHtml = isEditing
      ? `<div class="edit-field" onclick="event.stopPropagation()">
           <input class="edit-input" id="edit-input-${item.id}" value="${esc(item.text)}"
             onkeydown="handleEditKey(event,${item.id})"/>
           <button class="edit-confirm" onclick="event.stopPropagation();confirmEdit('${item.id}')">✓</button>
           <button class="edit-cancel" onclick="event.stopPropagation();cancelEdit()">×</button>
         </div>`
      : `<div class="item-body">
           <span class="item-text" ondblclick="event.stopPropagation();startEdit('${item.id}')">${esc(item.text)}</span>
           ${subHint}
         </div>`;

    const hasRepeat = item.repeat && item.repeat.length > 0;

    // Repeat picker row
    const days = ['Su','M','T','W','Th','F','Sa'];
    const repeatPickerHtml = (!isDone && item.repeatOpen)
      ? `<div class="repeat-row" onclick="event.stopPropagation()">
           ${days.map((d,i) => `<button class="repeat-day-btn${(item.repeat||[]).includes(i) ? ' active' : ''}" onclick="toggleRepeatDay('${item.id}',${i})">${d}</button>`).join('')}
           ${hasRepeat ? `<span class="repeat-indicator">↻ resets on selected days</span>` : ''}
         </div>` : '';

    const actionBtnsHtml = (!isDone && !isEditing) ? `
      <button class="icon-btn task-action-btn" onclick="event.stopPropagation();startEdit('${item.id}')" title="Edit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </button>
      <button class="icon-btn task-action-btn${hasRepeat ? ' repeat-active' : ''}" onclick="event.stopPropagation();toggleRepeatPicker('${item.id}')" title="Repeat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>` : '';
    const deleteBtnHtml = isEditing ? '' : `<button class="${isDone ? 'delete-row-btn always-visible' : 'delete-row-btn'}" onclick="event.stopPropagation();deleteItem('${item.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>`;

    const taskBlockHtml = `
      <div class="task-block${pickedClass}" id="task-${item.id}" data-id="${item.id}"${!isDone ? ' draggable="true"' : ''}>
        <div class="swipe-wrap" id="sw-${item.id}">
          <div class="swipe-delete-bg" id="sdb-${item.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            Delete
          </div>
          <div class="swipe-content" id="sc-${item.id}"
            ontouchstart="swipeTouchStart(event,'${item.id}')" ontouchmove="swipeTouchMove(event,'${item.id}')" ontouchend="swipeTouchEnd(event,'${item.id}')">
            <div class="item${isDone ? ' done' : ''}${noSubsClass}${isEditing ? ' editing' : ''}" onclick="${isEditing ? '' : `toggleItem('${item.id}')`}">
              ${(!isDone && !isEditing) ? `<div class="drag-handle" onmousedown="event.stopPropagation()" ontouchstart="handleDragTouchStart(event,'${item.id}')">
                <svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor">
                  <circle cx="3" cy="2"  r="1.5"/><circle cx="7" cy="2"  r="1.5"/>
                  <circle cx="3" cy="8"  r="1.5"/><circle cx="7" cy="8"  r="1.5"/>
                  <circle cx="3" cy="14" r="1.5"/><circle cx="7" cy="14" r="1.5"/>
                </svg>
              </div>` : ''}
              <div class="checkbox">
                <svg class="checkmark" viewBox="0 0 10 10" fill="none">
                  <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#1E1E1E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              ${(!isDone && !isEditing) ? `<div class="item-num${isPicked ? ' item-num-picked' : ''}">${numInner}</div>` : ''}
              ${itemBodyHtml}
              ${actionBtnsHtml}
              ${expandHtml}
              ${deleteBtnHtml}
            </div>
            ${repeatPickerHtml}
            ${progressHtml}
            ${subHtml}
          </div>
        </div>
      </div>`;

    if (isDone) completedHtml += taskBlockHtml;
    else html += taskBlockHtml;
  });

  container.innerHTML = html;
  initDragListeners();

  // Completed section below backlog
  if (completedContainer) {
    if (done.length > 0) {
      completedContainer.innerHTML = `
        <div class="backlog-section" style="border-top:1px solid var(--border)">
          <div class="section-label-row" style="padding:10px 14px 5px">
            <span class="section-label-text">Completed</span>
            <button class="uncheck-all-btn" onclick="uncheckAll()">Uncheck all</button>
          </div>
          <div style="padding:0 10px 10px;display:flex;flex-direction:column;gap:3px">${completedHtml}</div>
        </div>`;
    } else {
      completedContainer.innerHTML = '';
    }
  }

  // Focus sub-input if adding
  vms.forEach(it => {
    if (it.addingSubtask) {
      const el = document.getElementById(`sub-input-${it.id}`);
      if (el) setTimeout(() => el.focus(), 30);
    }
  });

  // Focus edit inputs
  if (editingId !== null) {
    if (editingSubId !== null) {
      const el = document.getElementById(`edit-sub-${editingId}-${editingSubId}`);
      if (el) { setTimeout(() => { el.focus(); el.select(); }, 30); }
    } else {
      const el = document.getElementById(`edit-input-${editingId}`);
      if (el) { setTimeout(() => { el.focus(); el.select(); }, 30); }
    }
  }
  renderBacklog();
}

// ── Data validation ────────────────────────────────────────────────────────
function validateItem(item) {
  if (!item || typeof item !== 'object') return null;
  return {
    id:          (typeof item.id === 'string' && item.id.length > 0) ? item.id : mkId(),
    text:        typeof item.text === 'string'        ? item.text.slice(0, 2000) : '',
    done:        typeof item.done === 'boolean'       ? item.done              : false,
    completedAt: typeof item.completedAt === 'number' ? item.completedAt       : null,
    repeat:      Array.isArray(item.repeat)
                   ? item.repeat.filter(d => Number.isInteger(d) && d >= 0 && d <= 6) : [],
    subtasks: Array.isArray(item.subtasks)
      ? item.subtasks
          .filter(s => s && typeof s === 'object')
          .map(s => ({
            id:   (typeof s.id === 'string' && s.id.length > 0) ? s.id : mkId(),
            text: typeof s.text === 'string' ? s.text.slice(0, 2000) : '',
            done: typeof s.done === 'boolean' ? s.done              : false,
          }))
      : [],
  };
}

function validateLists(raw) {
  if (!Array.isArray(raw)) return null;
  const validated = raw
    .filter(l => l && typeof l === 'object')
    .map(l => ({
      id:   (typeof l.id === 'string' && l.id.length > 0) ? l.id : mkId(),
      name: typeof l.name === 'string' ? l.name.slice(0, 200) : 'Untitled',
      items:        Array.isArray(l.items)        ? l.items.map(validateItem).filter(Boolean)        : [],
      backlogItems: Array.isArray(l.backlogItems) ? l.backlogItems.map(validateItem).filter(Boolean) : [],
    }));
  return validated.length > 0 ? validated : null;
}

function esc(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

// ── Drag & Drop reorder ────────────────────────────────────────────────────
// safeId: parse a dataset integer — returns null instead of NaN so callers
// can do a single null-check rather than relying on NaN's falsy quirks.
function safeId(val) {
  return (typeof val === 'string' && val.length > 0) ? val : null;
}

let dragSrcId = null;
let dragSrcSection = null; // 'active' or 'backlog'

function getSectionForId(id) {
  if (items.find(i => i.id === id)) return 'active';
  if (backlogItems.find(i => i.id === id)) return 'backlog';
  return null;
}

function initDragListeners() {
  const container = document.getElementById('list-container');
  const backlogList = document.getElementById('backlog-list');
  if (!container) return;

  function setupContainer(el, section) {
    el.addEventListener('dragstart', e => {
      const block = e.target.closest('.task-block[draggable="true"]');
      if (!block) return;
      dragSrcId = safeId(block.dataset.id);
      if (dragSrcId === null) return;
      dragSrcSection = section;
      block.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcId);
    });

    el.addEventListener('dragend', () => {
      stopAutoScroll();
      dragSrcId = null; dragSrcSection = null;
      document.querySelectorAll('.task-block').forEach(b =>
        b.classList.remove('dragging', 'drag-over-above', 'drag-over-below')
      );
      document.getElementById('list-container').classList.remove('drop-active');
      document.getElementById('backlog-list').classList.remove('drop-active');
    });

    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      autoScroll(e.clientY);
      const block = e.target.closest('.task-block[draggable="true"]');
      document.querySelectorAll('.task-block').forEach(b =>
        b.classList.remove('drag-over-above', 'drag-over-below')
      );
      // Highlight the zone if dragging from another section and no block target
      if (!block && dragSrcSection && dragSrcSection !== section) {
        el.classList.add('drop-active');
      } else {
        el.classList.remove('drop-active');
      }
      if (!block || !dragSrcId || safeId(block.dataset.id) === dragSrcId) return;
      const rect = block.getBoundingClientRect();
      block.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    });

    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) { el.classList.remove('drop-active'); stopAutoScroll(); }
      const block = e.target.closest('.task-block');
      if (block && !block.contains(e.relatedTarget))
        block.classList.remove('drag-over-above', 'drag-over-below');
    });

    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drop-active');
      const block = e.target.closest('.task-block[draggable="true"]');
      if (!dragSrcId) return;
      const targetSection = section;

      if (!block) {
        // Dropped onto empty zone — move to end of that section
        if (dragSrcSection !== targetSection) moveBetweenSections(dragSrcId, dragSrcSection, targetSection, -1, true);
        return;
      }
      const targetId = safeId(block.dataset.id);
      if (targetId === null || targetId === dragSrcId) return;
      const rect = block.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height / 2;

      if (dragSrcSection === targetSection) {
        reorderItems(dragSrcId, targetId, before, targetSection);
      } else {
        moveBetweenSections(dragSrcId, dragSrcSection, targetSection, targetId, before);
      }
    });
  }

  setupContainer(container, 'active');
  if (backlogList) setupContainer(backlogList, 'backlog');
}

function moveBetweenSections(srcId, fromSection, toSection, targetId, insertBefore) {
  let srcList   = fromSection === 'active' ? items : backlogItems;
  let destList  = toSection   === 'active' ? items : backlogItems;

  const srcIdx = srcList.findIndex(i => i.id === srcId);
  if (srcIdx === -1) return;
  const [moved] = srcList.splice(srcIdx, 1);

  if (targetId === -1) {
    destList.push(moved);
  } else {
    const tIdx = destList.findIndex(i => i.id === targetId);
    if (tIdx === -1) { destList.push(moved); }
    else destList.splice(insertBefore ? tIdx : tIdx + 1, 0, moved);
  }

  if (fromSection === 'active') items = srcList; else backlogItems = srcList;
  if (toSection   === 'active') items = destList; else backlogItems = destList;

  // Clear picks if moved
  if (pickedId === srcId) pickedId = null;
  if (pickedBacklogId === srcId) pickedBacklogId = null;

  save(); render();
}

function reorderItems(srcId, targetId, insertBefore, section) {
  let list = section === 'backlog' ? backlogItems : items.filter(i => !i.done);
  const done = section === 'backlog' ? [] : items.filter(i => i.done);

  const srcIdx = list.findIndex(i => i.id === srcId);
  const [moved] = list.splice(srcIdx, 1);
  const newTarget = list.findIndex(i => i.id === targetId);
  list.splice(insertBefore ? newTarget : newTarget + 1, 0, moved);

  if (section === 'backlog') backlogItems = list;
  else items = [...list, ...done];

  save(); render();
}

// ── Backlog render ─────────────────────────────────────────────────────────
function renderBacklog() {
  const countEl   = document.getElementById('backlog-count');
  const pickBtn   = document.getElementById('backlog-pick-btn');
  const listEl    = document.getElementById('backlog-list');
  const addRow    = document.getElementById('backlog-add-row');
  const bannerWrap= document.getElementById('backlog-banner-wrap');
  if (!listEl) return;

  rebuildDataLayer();
  const vms = getBacklogViewModels();

  if (countEl) countEl.textContent = vms.length;
  if (pickBtn) pickBtn.disabled = vms.length === 0;
  if (addRow)  addRow.style.display = backlogAddOpen ? '' : 'none';

  // Banner
  const pickedBacklog = vms.find(i => i.id === pickedBacklogId);
  if (bannerWrap) {
    if (pickedBacklog) {
      bannerWrap.style.display = '';
      document.getElementById('backlog-banner-text').textContent = pickedBacklog.text;
    } else {
      bannerWrap.style.display = 'none';
      pickedBacklogId = null;
    }
  }

  if (!vms.length) {
    listEl.innerHTML = `<div class="backlog-empty">Drag tasks here or use + to add</div>`;
    initDragListeners();
    return;
  }

  let html = '';
  vms.forEach(item => {
    const isPicked  = item.id === pickedBacklogId;
    const isDone    = item.done;
    const totalSubs = item.subtasks ? item.subtasks.length : 0;
    const doneSubs  = item.subtasks ? item.subtasks.filter(s => s.done).length : 0;
    const hasSubs   = totalSubs > 0;
    const pct       = hasSubs ? (doneSubs / totalSubs * 100) : 0;
    const showSubs  = (hasSubs || item.addingSubtask) && item.expanded;
    const noSubsClass = (!hasSubs && !item.addingSubtask) ? ' no-subs' : '';
    const isEditing = (editingId === item.id && editingSubId === null);

    const subHint = (hasSubs && !isDone) ? `<div class="item-sub-hint">${doneSubs}/${totalSubs} subtasks</div>` : '';

    // Body — inline edit or normal
    const itemBodyHtml = isEditing
      ? `<div class="edit-field" onclick="event.stopPropagation()">
           <input class="edit-input" id="edit-input-${item.id}" value="${esc(item.text)}"
             onkeydown="handleEditKey(event,${item.id})"/>
           <button class="edit-confirm" onclick="event.stopPropagation();confirmEdit('${item.id}')">✓</button>
           <button class="edit-cancel" onclick="event.stopPropagation();cancelEdit()">×</button>
         </div>`
      : `<div class="item-body">
           <span class="item-text" ondblclick="event.stopPropagation();startEdit('${item.id}')">${esc(item.text)}</span>
           ${subHint}
         </div>`;

    const expandHtml = (!isDone && !isEditing)
      ? (hasSubs || item.addingSubtask)
        ? `<button class="expand-btn${item.expanded ? ' open' : ''}" onclick="event.stopPropagation();toggleBacklogExpand('${item.id}')" aria-label="${item.expanded ? 'Collapse' : 'Expand'} subtasks">
             <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
           </button>`
        : `<button class="expand-btn add-sub-chevron" onclick="event.stopPropagation();openBacklogSubAdd('${item.id}')" title="Add subtask" aria-label="Add subtask">
             <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
           </button>`
      : '';

    const hasRepeatB = item.repeat && item.repeat.length > 0;
    const actionBtnsHtmlB = (!isDone && !isEditing) ? `
      <button class="icon-btn task-action-btn" onclick="event.stopPropagation();startEdit('${item.id}')" title="Edit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </button>
      <button class="icon-btn task-action-btn${hasRepeatB ? ' repeat-active' : ''}" onclick="event.stopPropagation();toggleBacklogRepeatPicker('${item.id}')" title="Repeat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>` : '';
    const deleteBtnHtmlB = isEditing ? '' : `<button class="${isDone ? 'delete-row-btn always-visible' : 'delete-row-btn'}" onclick="event.stopPropagation();deleteBacklogItem('${item.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>`;
    const days = ['Su','M','T','W','Th','F','Sa'];
    const repeatPickerHtmlB = (!isDone && item.repeatOpen)
      ? `<div class="repeat-row" onclick="event.stopPropagation()">
           ${days.map((d,i) => `<button class="repeat-day-btn${(item.repeat||[]).includes(i) ? ' active' : ''}" onclick="toggleBacklogRepeatDay('${item.id}',${i})">${d}</button>`).join('')}
           ${hasRepeatB ? `<span class="repeat-indicator">↻ resets on selected days</span>` : ''}
         </div>` : '';

    // Subtask rows
    let subHtml = '';
    if (hasSubs || item.addingSubtask) {
      let subRows = '';
      (item.subtasks || []).forEach(sub => {
        const isEditingSub = (editingId === item.id && editingSubId === sub.id);
        const subTextHtml = isEditingSub
          ? `<div class="edit-field" onclick="event.stopPropagation()" style="flex:1;min-width:0">
               <input class="sub-edit-input" id="edit-sub-${item.id}-${sub.id}" value="${esc(sub.text)}"
                 onkeydown="handleSubEditKey(event,${item.id},${sub.id})"/>
               <button class="edit-confirm" onclick="event.stopPropagation();confirmSubEdit('${item.id}','${sub.id}')">✓</button>
               <button class="edit-cancel" onclick="event.stopPropagation();cancelEdit()">×</button>
             </div>`
          : `<span class="subitem-text" ondblclick="event.stopPropagation();startSubEdit('${item.id}','${sub.id}')">${esc(sub.text)}</span>`;
        const subEditBtn = !isEditingSub
          ? `<button class="sub-icon-btn" onclick="event.stopPropagation();startSubEdit('${item.id}','${sub.id}')" style="color:var(--text-secondary)">
               <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
             </button>` : '';
        subRows += `
          <div class="subitem${sub.done ? ' done' : ''}" data-sub-id="${sub.id}" data-parent-id="${item.id}" onclick="${isEditingSub ? '' : `toggleBacklogSub('${item.id}','${sub.id}')`}">
            <div class="sub-drag-handle" ontouchstart="subDragTouchStart(event,'${item.id}','${sub.id}')" onmousedown="subDragMouseStart(event,'${item.id}','${sub.id}')">
              <svg width="8" height="12" viewBox="0 0 10 16" fill="currentColor">
                <circle cx="3" cy="2" r="1.5"/><circle cx="7" cy="2" r="1.5"/>
                <circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>
                <circle cx="3" cy="14" r="1.5"/><circle cx="7" cy="14" r="1.5"/>
              </svg>
            </div>
            <div class="sub-checkbox">
              <svg class="sub-checkmark" viewBox="0 0 8 8" fill="none">
                <polyline points="1,4 3,6.5 7,1.5" stroke="#1E1E1E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            ${subTextHtml}
            ${subEditBtn}
            <button class="sub-icon-btn" onclick="event.stopPropagation();deleteBacklogSub('${item.id}','${sub.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
          </div>`;
      });
      if (item.addingSubtask) {
        subRows += `
          <div class="sub-add-row" onclick="event.stopPropagation()">
            <input class="sub-add-input" id="sub-input-${item.id}" placeholder="New subtask…"
              onkeydown="handleBacklogSubKey(event,${item.id})"/>
            <button class="sub-add-confirm" onclick="confirmBacklogSub('${item.id}')">✓</button>
            <button class="sub-add-cancel" onclick="cancelBacklogSub('${item.id}')">×</button>
          </div>`;
      } else if (hasSubs && item.expanded && !isDone) {
        subRows += `
          <div class="sub-add-trigger" onclick="event.stopPropagation();openBacklogSubAdd('${item.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Add subtask
          </div>`;
      }
      const maxH = showSubs ? `${(totalSubs + (item.addingSubtask ? 1 : 0)) * 56 + 48}px` : '0px';
      subHtml = `<div class="subtasks" id="subs-${item.id}" style="max-height:${maxH}"><div class="subtasks-inner">${subRows}</div></div>`;
    }

    const progressHtml = (hasSubs && !isDone)
      ? `<div class="progress-row"><div class="progress-fill" style="width:${pct}%"></div></div>` : '';

    html += `
      <div class="task-block${isPicked ? ' picked-card' : ''}" id="task-${item.id}" data-id="${item.id}"${!isDone ? ' draggable="true"' : ''}>
        <div class="swipe-wrap" id="sw-${item.id}">
          <div class="swipe-delete-bg" id="sdb-${item.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            Delete
          </div>
          <div class="swipe-content" id="sc-${item.id}"
            ${!isDone ? `ontouchstart="swipeTouchStart(event,'${item.id}')" ontouchmove="swipeTouchMove(event,'${item.id}')" ontouchend="swipeTouchEnd(event,${item.id},true)"` : ''}>
            <div class="item${isDone ? ' done' : ''}${noSubsClass}${isEditing ? ' editing' : ''}" onclick="${isEditing ? '' : `toggleBacklogItem('${item.id}')`}">
              ${(!isDone && !isEditing) ? `<div class="drag-handle" onmousedown="event.stopPropagation()" ontouchstart="handleDragTouchStart(event,'${item.id}')">
                <svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor">
                  <circle cx="3" cy="2" r="1.5"/><circle cx="7" cy="2" r="1.5"/>
                  <circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>
                  <circle cx="3" cy="14" r="1.5"/><circle cx="7" cy="14" r="1.5"/>
                </svg>
              </div>` : ''}
              <div class="checkbox">
                <svg class="checkmark" viewBox="0 0 10 10" fill="none">
                  <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#1E1E1E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              ${itemBodyHtml}
              ${actionBtnsHtmlB}
              ${expandHtml}
              ${deleteBtnHtmlB}
            </div>
            ${repeatPickerHtmlB}
            ${progressHtml}
            ${subHtml}
          </div>
        </div>
      </div>`;
  });

  listEl.innerHTML = html;

  // Focus sub/edit inputs
  vms.forEach(it => {
    if (it.addingSubtask) {
      const el = document.getElementById(`sub-input-${it.id}`);
      if (el) setTimeout(() => el.focus(), 30);
    }
  });
  if (editingId !== null) {
    const item = vms.find(i => i.id === editingId);
    if (item) {
      if (editingSubId !== null) {
        const el = document.getElementById(`edit-sub-${editingId}-${editingSubId}`);
        if (el) setTimeout(() => { el.focus(); el.select(); }, 30);
      } else {
        const el = document.getElementById(`edit-input-${editingId}`);
        if (el) setTimeout(() => { el.focus(); el.select(); }, 30);
      }
    }
  }
  initDragListeners();
}

// ── Backlog actions ────────────────────────────────────────────────────────
function toggleBacklogAdd() {
  backlogAddOpen = !backlogAddOpen;
  renderBacklog();
  if (backlogAddOpen) setTimeout(() => document.getElementById('backlog-input')?.focus(), 30);
}

function addBacklogItem() {
  const input = document.getElementById('backlog-input');
  const text = input ? input.value.trim() : '';
  if (!text) { backlogAddOpen = false; renderBacklog(); return; }
  backlogItems.push({ id: mkId(), text, done: false, subtasks: [], repeat: [] });
  input.value = '';
  backlogAddOpen = false;
  save(); renderBacklog();
}

function deleteBacklogItem(id) {
  backlogItems = backlogItems.filter(i => i.id !== id);
  if (pickedBacklogId === id) pickedBacklogId = null;
  save(); renderBacklog();
}

function toggleBacklogItem(id) {
  const it = backlogItems.find(i => i.id === id);
  if (!it) return;
  it.done = !it.done;
  if (it.done) {
    (it.subtasks || []).forEach(s => s.done = true);
    setUI(id, { expanded: false });
    if (speedTallyActive) speedTallyTasks++;
    // Move to items (completed section) — remove from backlog
    backlogItems = backlogItems.filter(i => i.id !== id);
    if (pickedBacklogId === id) pickedBacklogId = null;
    items.push(it);
    syncToList(); save(); render(); renderBacklog(); scheduleRepeatResets();
  } else {
    // Uncheck — move back to backlog
    items = items.filter(i => i.id !== id);
    it.subtasks.forEach(s => s.done = false);
    if (speedTallyActive && speedTallyTasks > 0) speedTallyTasks--;
    backlogItems.push(it);
    syncToList(); save(); render(); renderBacklog();
  }
}

function toggleBacklogExpand(id) {
  setUI(id, { expanded: !getUI(id).expanded });
  renderBacklog();
}

function openBacklogSubAdd(id) {
  setUI(id, { addingSubtask: true, expanded: true });
  renderBacklog();
}

function cancelBacklogSub(id) {
  setUI(id, { addingSubtask: false });
  renderBacklog();
}

function confirmBacklogSub(id) {
  const it = backlogItems.find(i => i.id === id);
  if (!it) return;
  const el = document.getElementById(`sub-input-${id}`);
  const text = el ? el.value.trim() : '';
  if (!text) { cancelBacklogSub(id); return; }
  if (!it.subtasks) it.subtasks = [];
  it.subtasks.push({ id: mkId(), text, done: false });
  setUI(id, { addingSubtask: false });
  save(); renderBacklog();
}

function handleBacklogSubKey(e, id) {
  e.stopPropagation();
  if (e.key === 'Enter') confirmBacklogSub(id);
  if (e.key === 'Escape') cancelBacklogSub(id);
}

function toggleBacklogSub(parentId, subId) {
  const it = backlogItems.find(i => i.id === parentId);
  if (!it) return;
  const sub = (it.subtasks || []).find(s => s.id === subId);
  if (sub) {
    sub.done = !sub.done;
    if (speedTallyActive) {
      if (sub.done) speedTallySubtasks++;
      else if (speedTallySubtasks > 0) speedTallySubtasks--;
    }
  }
  if (it.subtasks && it.subtasks.length && it.subtasks.every(s => s.done)) {
    it.done = true;
    setUI(parentId, { expanded: false });
    if (speedTallyActive) speedTallyTasks++;
    // Move to completed section
    backlogItems = backlogItems.filter(i => i.id !== parentId);
    if (pickedBacklogId === parentId) pickedBacklogId = null;
    items.push(it);
    syncToList(); save(); render(); renderBacklog(); scheduleRepeatResets();
    return;
  }
  save(); renderBacklog();
}

function deleteBacklogSub(parentId, subId) {
  const it = backlogItems.find(i => i.id === parentId);
  if (it) { it.subtasks = (it.subtasks || []).filter(s => s.id !== subId); save(); renderBacklog(); }
}

function pickBacklog() {
  const active = backlogItems.filter(i => {
    if (i.done) return false;
    if (!i.subtasks || i.subtasks.length === 0) return true;
    return i.subtasks.some(s => !s.done);
  });
  if (!active.length) return;
  const pool = active.length > 1 ? active.filter(i => i.id !== pickedBacklogId) : active;
  pickedBacklogId = pool[Math.floor(Math.random() * pool.length)].id;
  renderBacklog();

function scrollToBacklogPicked() {

// ── Touch drag (mobile) ────────────────────────────────────────────────────
let touchDragId  = null;
let touchClone   = null;
let touchOffsetY = 0;
let scrollRafId  = null;

function autoScroll(clientY) {
  // Cancel any pending scroll frame
  if (scrollRafId) { cancelAnimationFrame(scrollRafId); scrollRafId = null; }

  const ZONE = 80;   // px from edge of viewport that triggers scroll
  const MAX  = 18;   // max px per frame

  function step() {
    const vh = window.innerHeight;
    let speed = 0;
    if (clientY < ZONE) {
      speed = -MAX * (1 - clientY / ZONE);
    } else if (clientY > vh - ZONE) {
      speed = MAX * ((clientY - (vh - ZONE)) / ZONE);
    }
    if (speed !== 0) {
      window.scrollBy(0, speed);
      scrollRafId = requestAnimationFrame(step);
    }
  }
  step();
}

function stopAutoScroll() {
  if (scrollRafId) { cancelAnimationFrame(scrollRafId); scrollRafId = null; }
}

function handleDragTouchStart(e, id) {
  if (e.touches.length !== 1) return;
  e.stopPropagation();
  touchDragId = id;
  dragSrcSection = getSectionForId(id);
  const block = document.getElementById(`task-${id}`);
  if (!block) return;
  const rect = block.getBoundingClientRect();
  touchOffsetY = e.touches[0].clientY - rect.top;
  touchClone = block.cloneNode(true);
  touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:9999;pointer-events:none;opacity:0.85;box-shadow:0 8px 32px rgba(0,0,0,0.5);border-radius:14px;transition:none;`;
  document.body.appendChild(touchClone);
  block.classList.add('dragging');
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend',  onTouchEnd,  { once: true });
}

function onTouchMove(e) {
  if (!touchClone) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  const x = e.touches[0].clientX;
  touchClone.style.top = (y - touchOffsetY) + 'px';
  autoScroll(y);
  document.querySelectorAll('.task-block').forEach(b => b.classList.remove('drag-over-above', 'drag-over-below'));
  const el = document.elementFromPoint(x, y);
  if (!el) return;
  const block = el.closest('.task-block[draggable="true"]');
  if (!block || safeId(block.dataset.id) === touchDragId) return;
  const rect = block.getBoundingClientRect();
  block.classList.add(y < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
}

function onTouchEnd(e) {
  stopAutoScroll();
  document.removeEventListener('touchmove', onTouchMove);
  if (touchClone) { touchClone.remove(); touchClone = null; }
  const srcBlock = document.getElementById(`task-${touchDragId}`);
  if (srcBlock) srcBlock.classList.remove('dragging');
  document.querySelectorAll('.task-block').forEach(b => b.classList.remove('drag-over-above', 'drag-over-below'));
  document.getElementById('list-container')?.classList.remove('drop-active');
  document.getElementById('backlog-list')?.classList.remove('drop-active');

  const y = e.changedTouches[0].clientY;
  const x = e.changedTouches[0].clientX;
  const el = document.elementFromPoint(x, y);
  if (el) {
    const block = el.closest('.task-block[draggable="true"]');
    const backlogZone = el.closest('#backlog-list');
    const activeZone  = el.closest('#list-container');
    const toSection = backlogZone ? 'backlog' : 'active';
    if (block && safeId(block.dataset.id) !== touchDragId) {
      const targetId = safeId(block.dataset.id);
      if (targetId !== null) {
        const rect = block.getBoundingClientRect();
        const before = y < rect.top + rect.height / 2;
        if (dragSrcSection === toSection) {
          reorderItems(touchDragId, targetId, before, toSection);
        } else {
          moveBetweenSections(touchDragId, dragSrcSection, toSection, targetId, before);
        }
      }
    } else if ((backlogZone || activeZone) && dragSrcSection !== toSection) {
      moveBetweenSections(touchDragId, dragSrcSection, toSection, -1, true);
    }
  }
  touchDragId = null; dragSrcSection = null;
}

// ── Swipe to delete ────────────────────────────────────────────────────────
const swipeState = {};
const SWIPE_THRESHOLD = 60;

function swipeTouchStart(e, id) {
  // Don't hijack drag-handle touches
  if (e.target.closest('.drag-handle')) return;
  swipeState[id] = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, dx: 0, decided: false };
}

function swipeTouchMove(e, id) {
  const s = swipeState[id];
  if (!s) return;
  const dx = e.touches[0].clientX - s.startX;
  const dy = e.touches[0].clientY - s.startY;

  if (!s.decided) {
    if (Math.abs(dy) > Math.abs(dx)) { delete swipeState[id]; return; } // vertical scroll
    if (Math.abs(dx) < 6) return;
    s.decided = true;
  }

  if (dx > 0) return; // only left swipe
  e.preventDefault();
  s.dx = dx;
  const clamped = Math.max(dx, -80);
  const sc = document.getElementById(`sc-${id}`);
  const bg = document.getElementById(`sdb-${id}`);
  if (sc) sc.style.transform = `translateX(${clamped}px)`;
  if (bg) bg.style.opacity = Math.min(-clamped / 80, 1);
}

function swipeTouchEnd(e, id, isBacklog) {
  const s = swipeState[id];
  if (!s) return;
  const sc = document.getElementById(`sc-${id}`);
  const bg = document.getElementById(`sdb-${id}`);
  if (s.dx < -SWIPE_THRESHOLD) {
    if (sc) { sc.style.transition = 'transform 0.18s ease'; sc.style.transform = 'translateX(-100%)'; }
    if (bg) bg.style.opacity = '1';
    setTimeout(() => { isBacklog ? deleteBacklogItem(id) : deleteItem(id); }, 180);
  } else {
    if (sc) { sc.style.transition = 'transform 0.2s ease'; sc.style.transform = ''; }
    if (bg) { bg.style.opacity = '0'; }
  }
  delete swipeState[id];
}
